plugins {
    id 'java'
}

repositories {
    mavenCentral()
}

dependencies {
    implementation project(':compiler')
    implementation project(':lib:java-lib')

    testImplementation 'org.assertj:assertj-core:3.27.6'
    testImplementation 'org.junit.jupiter:junit-jupiter:5.13.4'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

test {
    useJUnitPlatform()
}

def capybaraSourceDir = layout.projectDirectory.dir('src/main/capybara')
def generatedJavaDir = layout.buildDirectory.dir('generated/sources/capybara/java/main')

tasks.register('generateJavaFromCapybara', JavaExec) {
    group = 'build'
    description = 'Compiles Capybara files from src/main/capybara into generated Java sources.'

    inputs.dir(capybaraSourceDir)
    outputs.dir(generatedJavaDir)

    classpath = project(':app').sourceSets.main.runtimeClasspath
    mainClass = 'pl.grzeslowski.capybara.App'

    doFirst {
        args 'JAVA', capybaraSourceDir.asFile.absolutePath, generatedJavaDir.get().asFile.absolutePath
    }
}

sourceSets {
    main {
        java.srcDir generatedJavaDir
    }
}

tasks.named('compileJava') {
    dependsOn tasks.named('generateJavaFromCapybara')
}
