plugins {
    id 'java'
}

repositories {
    mavenCentral()
}

dependencies {
    implementation project(':compiler')
    implementation project(':lib:capybara-lib')

    testImplementation 'org.assertj:assertj-core:3.27.6'
    testImplementation 'org.junit.jupiter:junit-jupiter:5.13.4'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

test {
    useJUnitPlatform()
}

def capybaraSourceDir = layout.projectDirectory.dir('src/main/capybara')
def capybaraLibSourceDir = project(':lib:capybara-lib').layout.projectDirectory.dir('src/main/capybara')
def capybaraLibLinkedDir = project(':lib:capybara-lib').layout.buildDirectory.dir('generated/sources/capybara/linked/main')
def generatedJavaDir = layout.buildDirectory.dir('generated/sources/capybara/java/main')
def linkedOutputDir = layout.buildDirectory.dir('generated/sources/capybara/linked/main')
def capybaraDebugEnabled = gradle.startParameter.logLevel == org.gradle.api.logging.LogLevel.DEBUG

def prepareEmptyDir = { File dir ->
    if (dir.exists()) {
        java.nio.file.Files.walk(dir.toPath())
                .sorted(java.util.Comparator.reverseOrder())
                .forEach { path ->
                    if (path != dir.toPath()) {
                        java.nio.file.Files.deleteIfExists(path)
                    }
                }
    } else {
        dir.mkdirs()
    }
}

tasks.register('linkCapybaraSources', JavaExec) {
    group = 'build'
    description = 'Compiles Capybara files from src/main/capybara and generates Java in one pass.'
    dependsOn project(':lib:capybara-lib').tasks.named('linkCapybara')

    inputs.dir(capybaraSourceDir)
    inputs.dir(capybaraLibSourceDir)
    outputs.dir(linkedOutputDir)
    outputs.dir(generatedJavaDir)

    classpath = project(':capy').sourceSets.main.runtimeClasspath
    mainClass = 'dev.capylang.Capy'

    doFirst {
        prepareEmptyDir(linkedOutputDir.get().asFile)
        prepareEmptyDir(generatedJavaDir.get().asFile)
        def capybaraArgs = [
                'compile-generate',
                'java',
                '--skip-java-lib',
                '-i', capybaraSourceDir.asFile.absolutePath,
                '-o', generatedJavaDir.get().asFile.absolutePath,
                '-l', capybaraLibLinkedDir.get().asFile.absolutePath,
                '--linked-output', linkedOutputDir.get().asFile.absolutePath
        ]
        if (capybaraDebugEnabled) {
            capybaraArgs.addAll(['--log', 'DEBUG'])
        }
        setArgs(capybaraArgs)
    }
}

tasks.register('generateJavaFromCapybara') {
    group = 'build'
    description = 'Compatibility task for Java generation from Capybara sources.'
    dependsOn tasks.named('linkCapybaraSources')
}

sourceSets {
    main {
        java.srcDir generatedJavaDir
    }
}

tasks.named('compileJava') {
    dependsOn tasks.named('generateJavaFromCapybara')
}
