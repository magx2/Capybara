abstract class InProcessCapybaraCompileTask extends DefaultTask {
    @Classpath
    abstract ConfigurableFileCollection getRuntimeClasspath()

    @InputDirectory
    @PathSensitive(PathSensitivity.RELATIVE)
    abstract DirectoryProperty getInputDir()

    @InputFiles
    @PathSensitive(PathSensitivity.RELATIVE)
    abstract ConfigurableFileCollection getAdditionalInputDirs()

    @OutputDirectory
    abstract DirectoryProperty getLinkedOutputDir()

    @OutputDirectory
    abstract DirectoryProperty getGeneratedOutputDir()

    @Input
    abstract Property<String> getCompilerVersion()

    @Input
    abstract Property<String> getOutputTypeName()

    @TaskAction
    void compileCapybara() {
        def errors = new ByteArrayOutputStream()
        def runtimeUrls = runtimeClasspath.files.collect { it.toURI().toURL() } as URL[]
        URLClassLoader classLoader = new URLClassLoader(runtimeUrls, ClassLoader.getPlatformClassLoader())
        try {
            def capyClass = Class.forName('dev.capylang.cli.Capy', true, classLoader)
            def compileGenerateOptions = generatedMethod(
                    capyClass,
                    'compileGenerateOptions',
                    String,
                    String,
                    String,
                    java.util.Optional,
                    java.util.Optional,
                    java.util.Optional,
                    Boolean.TYPE,
                    Boolean.TYPE
            )
            def runCompileGenerate = generatedMethod(capyClass, 'runCompileGenerate', compileGenerateOptions.returnType)
            def options = compileGenerateOptions.invoke(
                    null,
                    outputTypeArgument(outputTypeName.getOrElse('JAVA')),
                    inputDir.get().asFile.toString(),
                    generatedOutputDir.get().asFile.toString(),
                    java.util.Optional.of(linkedOutputDir.get().asFile.toString()),
                    java.util.Optional.empty(),
                    java.util.Optional.empty(),
                    true,
                    false
            )
            def exitCode = runProgram(runCompileGenerate.invoke(null, options), new PrintStream(errors))
            if (exitCode != 0) {
                def message = errors.toString().trim()
                throw new GradleException(message ?: "Capybara compile failed with exit code ${exitCode}")
            }
        } finally {
            classLoader.close()
        }
    }

    private static def generatedMethod(Class<?> type, String name, Class<?>... parameterTypes) {
        def exact = type.declaredMethods.find { method ->
            method.name == name && java.util.Arrays.equals(method.parameterTypes, parameterTypes)
        }
        def generated = exact ?: type.declaredMethods.find { method ->
            method.name.startsWith("${name}__") && java.util.Arrays.equals(method.parameterTypes, parameterTypes)
        }
        if (generated == null) {
            throw new GradleException("Unable to find generated Capy method `${name}` on ${type.name}.")
        }
        generated.accessible = true
        generated
    }

    private static String outputTypeArgument(String outputTypeName) {
        switch (outputTypeName.toUpperCase(Locale.ROOT)) {
            case 'JAVA':
                return 'java'
            case 'PYTHON':
                return 'python'
            case 'JAVASCRIPT':
                return 'javascript'
            default:
                throw new GradleException("Unknown Capybara output type: ${outputTypeName}")
        }
    }

    private static int runProgram(def effect, PrintStream errors) {
        try {
            def program = effect.unsafeRun()
            if (program != null && program.class.simpleName == 'Failed') {
                return program.class.getMethod('exit_code').invoke(program) as Integer
            }
            return 0
        } catch (RuntimeException exception) {
            errors.println(rootCauseMessage(exception))
            return 1
        }
    }

    private static String rootCauseMessage(Throwable throwable) {
        def current = throwable
        while (current.cause != null) {
            current = current.cause
        }
        current.message ?: current.toString()
    }
}

abstract class CapybaraJavaScriptTestTask extends DefaultTask {
    @Inject
    abstract ExecOperations getExecOperations()

    @InputFile
    @PathSensitive(PathSensitivity.RELATIVE)
    abstract RegularFileProperty getRunnerFile()

    @InputDirectory
    @PathSensitive(PathSensitivity.RELATIVE)
    abstract DirectoryProperty getGeneratedDir()

    @OutputDirectory
    abstract DirectoryProperty getOutputDir()

    @Internal
    abstract DirectoryProperty getExecutionDir()

    @Input
    abstract Property<String> getReportType()

    @Input
    abstract Property<String> getLogType()

    @Input
    abstract ListProperty<String> getTests()

    @Input
    abstract Property<Boolean> getPrintAvailableTests()

    @Input
    abstract Property<String> getOperatingSystemName()

    @Option(option = 'tests', description = 'Run only matching Capybara tests. Can be provided multiple times.')
    void addTest(String test) {
        getTests().add(test)
    }

    @Option(option = 'available-tests', description = 'Print available Capybara tests without running them.')
    void setAvailableTests(boolean availableTests) {
        getPrintAvailableTests().set(availableTests)
    }

    @TaskAction
    void runJavaScriptTests() {
        if (!printAvailableTests.getOrElse(false)) {
            def directory = outputDir.get().asFile
            if (directory.exists()) {
                directory.deleteDir()
            }
            directory.mkdirs()
        }

        def command = [
                nodeExecutable(operatingSystemName.get()),
                runnerFile.get().asFile.absolutePath,
                '--generated-dir', generatedDir.get().asFile.absolutePath,
                '--output-dir', outputDir.get().asFile.absolutePath,
                '--report-type', reportType.get()
        ]
        def configuredLogType = logType.getOrElse('NONE')
        if (!configuredLogType.isBlank() && !configuredLogType.equalsIgnoreCase('NONE')) {
            command.addAll(['--log', configuredLogType])
        }
        tests.getOrElse([]).each { test ->
            command.addAll(['--tests', test])
        }
        if (printAvailableTests.getOrElse(false)) {
            command.add('--available-tests')
        }

        getExecOperations().exec { execSpec ->
            execSpec.workingDir(getExecutionDir().get().asFile)
            execSpec.commandLine(command)
        }
    }

    private static String nodeExecutable(String osName) {
        def normalized = osName.toLowerCase(Locale.ROOT)
        if (normalized.contains('windows')) {
            return 'node.exe'
        }
        return 'node'
    }
}

abstract class CapybaraPythonTestTask extends DefaultTask {
    @Inject
    abstract ExecOperations getExecOperations()

    @InputFile
    @PathSensitive(PathSensitivity.RELATIVE)
    abstract RegularFileProperty getRunnerFile()

    @InputDirectory
    @PathSensitive(PathSensitivity.RELATIVE)
    abstract DirectoryProperty getGeneratedDir()

    @OutputDirectory
    abstract DirectoryProperty getOutputDir()

    @Internal
    abstract DirectoryProperty getExecutionDir()

    @Optional
    @InputDirectory
    @PathSensitive(PathSensitivity.RELATIVE)
    abstract DirectoryProperty getNativePythonDir()

    @Input
    abstract Property<String> getReportType()

    @Input
    abstract Property<String> getLogType()

    @Input
    abstract ListProperty<String> getTests()

    @Input
    abstract Property<Boolean> getPrintAvailableTests()

    @Input
    abstract Property<String> getOperatingSystemName()

    @Option(option = 'tests', description = 'Run only matching Capybara tests. Can be provided multiple times.')
    void addTest(String test) {
        getTests().add(test)
    }

    @Option(option = 'available-tests', description = 'Print available Capybara tests without running them.')
    void setAvailableTests(boolean availableTests) {
        getPrintAvailableTests().set(availableTests)
    }

    @TaskAction
    void runPythonTests() {
        if (!printAvailableTests.getOrElse(false)) {
            def directory = outputDir.get().asFile
            if (directory.exists()) {
                directory.deleteDir()
            }
            directory.mkdirs()
        }

        def command = [
                pythonExecutable(operatingSystemName.get()),
                runnerFile.get().asFile.absolutePath,
                '--generated-dir', generatedDir.get().asFile.absolutePath,
                '--output-dir', outputDir.get().asFile.absolutePath,
                '--report-type', reportType.get()
        ]
        def configuredLogType = logType.getOrElse('NONE')
        if (!configuredLogType.isBlank() && !configuredLogType.equalsIgnoreCase('NONE')) {
            command.addAll(['--log', configuredLogType])
        }
        tests.getOrElse([]).each { test ->
            command.addAll(['--tests', test])
        }
        if (printAvailableTests.getOrElse(false)) {
            command.add('--available-tests')
        }

        getExecOperations().exec { execSpec ->
            execSpec.workingDir(getExecutionDir().get().asFile)
            execSpec.commandLine(command)
            if (getNativePythonDir().isPresent()) {
                def nativeDir = getNativePythonDir().get().asFile
                if (nativeDir.exists()) {
                    def currentPythonPath = System.getenv('PYTHONPATH')
                    execSpec.environment(
                            'PYTHONPATH',
                            currentPythonPath == null || currentPythonPath.isBlank()
                                    ? nativeDir.absolutePath
                                    : nativeDir.absolutePath + File.pathSeparator + currentPythonPath
                    )
                }
            }
        }
    }

    private static String pythonExecutable(String osName) {
        def normalized = osName.toLowerCase(Locale.ROOT)
        if (normalized.contains('windows')) {
            return 'python.exe'
        }
        return 'python3'
    }
}

