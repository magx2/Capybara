    inputs.files(capyRuntimeClasspath)
            .withPropertyName('capyRuntimeClasspath')
            .withPathSensitivity(PathSensitivity.RELATIVE)
    shouldRunAfter test
}

def capybaraRunnerArgs = { generatedDir, outputDir, tests, printAvailableTests ->
    def runnerArgs = [
            '--generated-dir', generatedDir.get().asFile.absolutePath,
            '--output-dir', outputDir.get().asFile.absolutePath,
            '--report-type', 'JUNIT',
            '--log', 'TC'
    ]
    tests.getOrElse([]).each { test ->
        runnerArgs.addAll(['--tests', test])
    }
    if (printAvailableTests.getOrElse(false)) {
        runnerArgs.add('--available-tests')
    }
    runnerArgs
}
def resetCapybaraTestResults = { outputDir ->
    def directory = outputDir.get().asFile
    if (directory.exists()) {
        directory.deleteDir()
    }
    directory.mkdirs()
}

