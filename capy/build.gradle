def systemPythonExecutable = {
    def normalized = System.getProperty('os.name').toLowerCase(Locale.ROOT)
    if (normalized.contains('linux')) {
        return 'python3'
    }
    if (normalized.contains('windows')) {
        return 'python.exe'
    }
    throw new GradleException("Python parser smoke supports Linux and Windows only. Current OS: ${System.getProperty('os.name')}")
}

tasks.register('preparePythonAntlrGrammars') {
    group = 'build'
    description = 'Prepares Python-target ANTLR grammar overlays.'

    inputs.file(functionalGrammarFile)
            .withPropertyName('functionalGrammar')
            .withPathSensitivity(PathSensitivity.RELATIVE)
    inputs.file(objectOrientedGrammarFile)
            .withPropertyName('objectOrientedGrammar')
            .withPathSensitivity(PathSensitivity.RELATIVE)
    outputs.dir(pythonAntlrGrammarDir)

    doLast {
        def outputDir = pythonAntlrGrammarDir.get().asFile
        outputDir.deleteDir()
        outputDir.mkdirs()

        def functionalSource = functionalGrammarFile.asFile.text
        def programStart = functionalSource.indexOf('program :')
        if (programStart < 0) {
            throw new GradleException('Unable to locate Functional.g4 program rule.')
        }
        def functionalPrefix = functionalSource.substring(0, functionalSource.indexOf('@header')).trim() + System.lineSeparator() + System.lineSeparator()
        def pythonLexerMembers = '''@lexer::members {
lineStart = True

def containsNewline(self, text):
    return '\\n' in text or '\\r' in text

def emit(self):
    self.lineStart = False
    return super().emit()
}

'''
        def functionalPython = functionalPrefix + pythonLexerMembers + functionalSource.substring(programStart)
        functionalPython = functionalPython
                .replace('{ "multiple".equals(_input.LT(1).getText()) }?', '{ self._input.LT(1).text == "multiple" }?')
                .replace('{ "annotation".equals(_input.LT(1).getText()) }?', '{ self._input.LT(1).text == "annotation" }?')
                .replace('{ "on".equals(_input.LT(1).getText()) }?', '{ self._input.LT(1).text == "on" }?')
                .replace('{ "method".equals(_input.LT(1).getText()) }?', '{ self._input.LT(1).text == "method" }?')
                .replace('{ "class".equals(_input.LT(1).getText()) }?', '{ self._input.LT(1).text == "class" }?')
                .replace('{ "interface".equals(_input.LT(1).getText()) }?', '{ self._input.LT(1).text == "interface" }?')
                .replace('{ "trait".equals(_input.LT(1).getText()) }?', '{ self._input.LT(1).text == "trait" }?')
                .replace('{ "field".equals(_input.LT(1).getText()) }?', '{ self._input.LT(1).text == "field" }?')
                .replace('{ "init".equals(_input.LT(1).getText()) }?', '{ self._input.LT(1).text == "init" }?')
                .replace('{ "String".equals(_input.LT(1).getText()) }?', '{ self._input.LT(1).text == "String" }?')
                .replace('{lineStart}?', '{self.lineStart}?')
                .replace('{ if (containsNewline(getText())) lineStart = true; }', '{self.lineStart = self.lineStart or self.containsNewline(self.text)}')
        new File(outputDir, 'Functional.g4').text = functionalPython

        def objectSource = objectOrientedGrammarFile.asFile.text
        def objectPython = objectSource.replaceFirst(/(?s)\n@header\s*\{.*?\}\s*/, System.lineSeparator())
        new File(outputDir, 'ObjectOriented.g4').text = objectPython
    }
}

tasks.register('generatePythonAntlr', JavaExec) {
    group = 'build'
    description = 'Generates Python ANTLR parser sources.'
    dependsOn tasks.named('preparePythonAntlrGrammars')

    inputs.dir(pythonAntlrGrammarDir)
            .withPropertyName('pythonAntlrGrammars')
            .withPathSensitivity(PathSensitivity.RELATIVE)
    outputs.dir(pythonAntlrGeneratedDir)

    classpath = configurations.antlr
    mainClass = 'org.antlr.v4.Tool'

    doFirst {
        def outputDir = pythonAntlrGeneratedDir.get().asFile
        outputDir.deleteDir()
        outputDir.mkdirs()
        workingDir = pythonAntlrGrammarDir.get().asFile
        setArgs(['-Dlanguage=Python3', '-o', outputDir.absolutePath, 'Functional.g4', 'ObjectOriented.g4'])
    }
}

tasks.register('prepareJavaScriptAntlrGrammars') {
    group = 'build'
    description = 'Prepares JavaScript-target ANTLR grammar overlays.'

    inputs.file(functionalGrammarFile)
            .withPropertyName('functionalGrammar')
            .withPathSensitivity(PathSensitivity.RELATIVE)
    inputs.file(objectOrientedGrammarFile)
            .withPropertyName('objectOrientedGrammar')
            .withPathSensitivity(PathSensitivity.RELATIVE)
    outputs.dir(javascriptAntlrGrammarDir)

    doLast {
        def outputDir = javascriptAntlrGrammarDir.get().asFile
        outputDir.deleteDir()
        outputDir.mkdirs()

        def functionalSource = functionalGrammarFile.asFile.text
        def programStart = functionalSource.indexOf('program :')
        if (programStart < 0) {
            throw new GradleException('Unable to locate Functional.g4 program rule.')
        }
        def functionalPrefix = functionalSource.substring(0, functionalSource.indexOf('@header')).trim() + System.lineSeparator() + System.lineSeparator()
        def javascriptLexerMembers = '''@lexer::members {
this.lineStart = true;
this.containsNewline = function(text) {
    return text.indexOf('\\n') >= 0 || text.indexOf('\\r') >= 0;
};
this.emit = function() {
    this.lineStart = false;
    return antlr4.Lexer.prototype.emit.call(this);
};
}

'''
        def functionalJavaScript = functionalPrefix + javascriptLexerMembers + functionalSource.substring(programStart)
        functionalJavaScript = functionalJavaScript
                .replace('{ "multiple".equals(_input.LT(1).getText()) }?', '{this._input.LT(1).text === "multiple"}?')
                .replace('{ "annotation".equals(_input.LT(1).getText()) }?', '{this._input.LT(1).text === "annotation"}?')
                .replace('{ "on".equals(_input.LT(1).getText()) }?', '{this._input.LT(1).text === "on"}?')
                .replace('{ "method".equals(_input.LT(1).getText()) }?', '{this._input.LT(1).text === "method"}?')
                .replace('{ "class".equals(_input.LT(1).getText()) }?', '{this._input.LT(1).text === "class"}?')
                .replace('{ "interface".equals(_input.LT(1).getText()) }?', '{this._input.LT(1).text === "interface"}?')
                .replace('{ "trait".equals(_input.LT(1).getText()) }?', '{this._input.LT(1).text === "trait"}?')
                .replace('{ "field".equals(_input.LT(1).getText()) }?', '{this._input.LT(1).text === "field"}?')
                .replace('{ "init".equals(_input.LT(1).getText()) }?', '{this._input.LT(1).text === "init"}?')
                .replace('{ "String".equals(_input.LT(1).getText()) }?', '{this._input.LT(1).text === "String"}?')
                .replace('{lineStart}?', '{this.lineStart}?')
                .replace('{ if (containsNewline(getText())) lineStart = true; }', '{ this.lineStart = this.lineStart || this.containsNewline(this.text); }')
        new File(outputDir, 'Functional.g4').text = functionalJavaScript

        def objectSource = objectOrientedGrammarFile.asFile.text
        def objectJavaScript = objectSource.replaceFirst(/(?s)\n@header\s*\{.*?\}\s*/, System.lineSeparator())
        new File(outputDir, 'ObjectOriented.g4').text = objectJavaScript
    }
}

tasks.register('generateJavaScriptAntlrEsm', JavaExec) {
