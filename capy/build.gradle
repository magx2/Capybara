plugins {
    id 'buildlogic.java-application-conventions'
    id "com.github.node-gradle.node" version "7.1.0"
}

abstract class InProcessCapybaraCompileTask extends DefaultTask {
    @Classpath
    abstract ConfigurableFileCollection getRuntimeClasspath()

    @InputDirectory
    @PathSensitive(PathSensitivity.RELATIVE)
    abstract DirectoryProperty getInputDir()

    @InputFiles
    @PathSensitive(PathSensitivity.RELATIVE)
    abstract ConfigurableFileCollection getAdditionalInputDirs()

    @OutputDirectory
    abstract DirectoryProperty getLinkedOutputDir()

    @OutputDirectory
    abstract DirectoryProperty getGeneratedOutputDir()

    @Input
    abstract Property<Boolean> getIncludeJavaLibResources()

    @Input
    abstract Property<String> getCompilerVersion()

    @Input
    abstract Property<String> getOutputTypeName()

    @TaskAction
    void compileCapybara() {
        def errors = new ByteArrayOutputStream()
        def runtimeUrls = runtimeClasspath.files.collect { it.toURI().toURL() } as URL[]
        URLClassLoader classLoader = new URLClassLoader(runtimeUrls, ClassLoader.getPlatformClassLoader())
        try {
            def capyClass = Class.forName('dev.capylang.Capy', true, classLoader)
            def readLinkedProgram = capyClass.getDeclaredMethod('readLinkedProgram', Path, Boolean.TYPE)
            readLinkedProgram.accessible = true
            def outputTypeClass = Class.forName('dev.capylang.compiler.OutputType', true, classLoader)
            def outputType = outputTypeClass.enumConstants.find { it.name() == outputTypeName.get() }
            def compileGenerate = capyClass.getMethod(
                    'compileGenerate',
                    outputTypeClass,
                    Path,
                    Path,
                    Path,
                    Path,
                    Path,
                    TreeSet,
                    Boolean.TYPE,
                    Boolean.TYPE,
                    String,
                    PrintStream
            )

            def libraries = new TreeSet()
            additionalInputDirs.files.each { libraryDir ->
                Path libraryPath = libraryDir.toPath()
                if (Files.notExists(libraryPath) || !Files.isDirectory(libraryPath)) {
                    return
                }
                def program = readLinkedProgram.invoke(null, libraryPath, false)
                libraries.addAll(program.modules())
            }

            def exitCode = compileGenerate.invoke(
                    null,
                    outputType,
                    inputDir.get().asFile.toPath(),
                    generatedOutputDir.get().asFile.toPath(),
                    linkedOutputDir.get().asFile.toPath(),
                    null,
                    null,
                    libraries,
                    false,
                    includeJavaLibResources.getOrElse(true),
                    compilerVersion.get(),
                    new PrintStream(errors)
            ) as Integer
            if (exitCode != 0) {
                def message = errors.toString().trim()
                throw new GradleException(message ?: "Capybara compile failed with exit code ${exitCode}")
            }
        } finally {
            classLoader.close()
        }
    }
}

dependencies {
    implementation project(':compiler')
    implementation 'com.fasterxml.jackson.core:jackson-databind:2.19.0'
    implementation 'com.fasterxml.jackson.datatype:jackson-datatype-jdk8:2.19.0'
    implementation 'org.yaml:snakeyaml:2.4'

    testImplementation 'org.assertj:assertj-core:3.27.6'
}

def capybaraVersion = project.version.toString()
def javaLibSourceDir = rootProject.layout.projectDirectory.dir('lib/capybara-lib/src/main/java')
def capyClassesDir = layout.buildDirectory.dir('classes/java/main')
def capyResourcesDir = layout.buildDirectory.dir('resources/main')
def compilerClassesDir = project(':compiler').layout.buildDirectory.dir('classes/java/main')
def compilerResourcesDir = project(':compiler').layout.buildDirectory.dir('resources/main')
def capybaraLibClassesDir = project(':lib:capybara-lib').layout.buildDirectory.dir('classes/java/main')
def capybaraLibResourcesDir = project(':lib:capybara-lib').layout.buildDirectory.dir('resources/main')
def capybaraLibLinkedDir = project(':lib:capybara-lib').layout.buildDirectory.dir('generated/sources/capybara/linked/main')
def testRuntimeDependencies = configurations.testRuntimeClasspath.incoming.artifactView {
    componentFilter { componentIdentifier -> !(componentIdentifier instanceof ProjectComponentIdentifier) }
}.files

def e2eCfunCapybaraSourceDir = layout.projectDirectory.dir('src/e2e-cfun/capybara')
def e2eCfunGeneratedJavaDir = layout.buildDirectory.dir('generated/sources/capybara/java/e2e-cfun')
def e2eCfunGeneratedJsDir = layout.buildDirectory.dir('generated/sources/capybara/js/e2e-cfun')
def e2eCfunLinkedOutputDir = layout.buildDirectory.dir('generated/sources/capybara/linked/e2e-cfun')
def e2eCfunLinkedJsOutputDir = layout.buildDirectory.dir('generated/sources/capybara/linked-js/e2e-cfun')
def e2eCooCapybaraSourceDir = layout.projectDirectory.dir('src/e2e-coo/capybara')
def e2eCooGeneratedJavaDir = layout.buildDirectory.dir('generated/sources/capybara/java/e2e-coo')
def e2eCooLinkedOutputDir = layout.buildDirectory.dir('generated/sources/capybara/linked/e2e-coo')
def jsTestSourcePath = 'src/test/js'
def jsTestRunner = layout.projectDirectory.file("${jsTestSourcePath}/run-tests.js")
def e2eCfunJsTestSourcePath = 'src/e2e-cfun/js'
def capyRuntimeDependencies = configurations.runtimeClasspath.incoming.artifactView {
    componentFilter { componentIdentifier -> !(componentIdentifier instanceof ProjectComponentIdentifier) }
}.files
def capyRuntimeClasspath = files(
        capyClassesDir,
        capyResourcesDir,
        compilerClassesDir,
        compilerResourcesDir,
        capyRuntimeDependencies
)

sourceSets {
    e2eCfun {
        java.srcDir e2eCfunGeneratedJavaDir
        java.srcDir file('src/e2e-cfun/java')
        resources.srcDir file('src/e2e-cfun/resources')
        compileClasspath += sourceSets.main.output + configurations.testRuntimeClasspath
        runtimeClasspath += output + compileClasspath
    }
    e2eCoo {
        java.srcDir e2eCooGeneratedJavaDir
        java.srcDir file('src/e2e-coo/java')
        resources.srcDir file('src/e2e-coo/resources')
        compileClasspath += sourceSets.main.output + configurations.testRuntimeClasspath
        runtimeClasspath += output + compileClasspath
    }
}

configurations {
    e2eCfunImplementation.extendsFrom testImplementation
    e2eCfunRuntimeOnly.extendsFrom testRuntimeOnly
    e2eCooImplementation.extendsFrom testImplementation
    e2eCooRuntimeOnly.extendsFrom testRuntimeOnly
}

dependencies {
    e2eCfunImplementation project(':lib:capybara-lib')
    e2eCooImplementation project(':lib:capybara-lib')
}

def e2eCfunRuntimeDependencies = configurations.e2eCfunRuntimeClasspath.incoming.artifactView {
    componentFilter { componentIdentifier -> !(componentIdentifier instanceof ProjectComponentIdentifier) }
}.files
def e2eCooRuntimeDependencies = configurations.e2eCooRuntimeClasspath.incoming.artifactView {
    componentFilter { componentIdentifier -> !(componentIdentifier instanceof ProjectComponentIdentifier) }
}.files

processResources {
    filesMatching('capybara-version.txt') {
        expand(version: capybaraVersion)
    }
    from(javaLibSourceDir) {
        into 'java-lib-src'
    }
}

application {
    mainClass = 'dev.capylang.Capy'
}

test {
    dependsOn ':compiler:classes'
    classpath = files(
            sourceSets.test.output,
            capyClassesDir,
            capyResourcesDir,
            compilerClassesDir,
            compilerResourcesDir,
            testRuntimeDependencies
    )
}

def registerE2eTestTask = { String taskName, String taskDescription, sourceSet, runtimeDependencies, String compileJavaTaskName ->
    tasks.register(taskName, Test) {
        description = taskDescription
        group = 'verification'
        dependsOn ':compiler:classes'
        dependsOn ':lib:capybara-lib:classes'
        dependsOn tasks.named(compileJavaTaskName)
        testClassesDirs = sourceSet.output.classesDirs
        classpath = files(
                sourceSet.output,
                sourceSets.main.output,
                compilerClassesDir,
                compilerResourcesDir,
                capybaraLibClassesDir,
                capybaraLibResourcesDir,
                runtimeDependencies
        )
        shouldRunAfter test
        useJUnitPlatform()
    }
}

def e2eCfunTests = registerE2eTestTask(
        'e2e-cfun',
        'Runs functional e2e tests.',
        sourceSets.e2eCfun,
        e2eCfunRuntimeDependencies,
        'compileE2eCfunJava'
)
def e2eCooTests = registerE2eTestTask(
        'e2e-coo',
        'Runs object-oriented e2e tests.',
        sourceSets.e2eCoo,
        e2eCooRuntimeDependencies,
        'compileE2eCooJava'
)
def jsTests = tasks.register('jsTests', NodeTask) {
    description = 'Runs JavaScript tests.'
    group = 'verification'
    dependsOn ':capy:classes'
    dependsOn ':compiler:classes'
    script.set(jsTestRunner)
    workingDir.set(layout.projectDirectory)
    args.set([jsTestSourcePath])
    environment.put('CAPY_CLI_CLASSPATH', capyRuntimeClasspath.asPath)
    inputs.files(fileTree(jsTestSourcePath) {
        include '**/*.js'
    })
            .withPropertyName('jsTestSources')
            .withPathSensitivity(PathSensitivity.RELATIVE)
    inputs.files(capyRuntimeClasspath)
            .withPropertyName('capyRuntimeClasspath')
            .withPathSensitivity(PathSensitivity.RELATIVE)
    shouldRunAfter test
}

def e2eCfunJsTests = tasks.register('e2e-cfun-js', NodeTask) {
    description = 'Runs functional JavaScript e2e tests.'
    group = 'verification'
    dependsOn ':capy:classes'
    dependsOn ':compiler:classes'
    script.set(jsTestRunner)
    workingDir.set(layout.projectDirectory)
    args.set([e2eCfunJsTestSourcePath])
    environment.put('CAPY_CLI_CLASSPATH', capyRuntimeClasspath.asPath)
    environment.put('CAPY_E2E_CFUN_JS_GENERATED_DIR', e2eCfunGeneratedJsDir.get().asFile.absolutePath)
    inputs.files(fileTree(e2eCfunJsTestSourcePath) {
        include '**/*.js'
    })
            .withPropertyName('e2eCfunJsTestSources')
            .withPathSensitivity(PathSensitivity.RELATIVE)
    inputs.dir(e2eCfunGeneratedJsDir)
            .withPropertyName('e2eCfunGeneratedJsSources')
            .withPathSensitivity(PathSensitivity.RELATIVE)
    inputs.files(capyRuntimeClasspath)
            .withPropertyName('capyRuntimeClasspath')
            .withPathSensitivity(PathSensitivity.RELATIVE)
    shouldRunAfter e2eCfunTests
}

tasks.register('e2eTests') {
    description = 'Runs all e2e tests.'
    group = 'verification'
    dependsOn e2eCfunTests
    dependsOn e2eCfunJsTests
    dependsOn e2eCooTests
    dependsOn jsTests
}

check {
    dependsOn e2eCfunTests
    dependsOn e2eCfunJsTests
    dependsOn e2eCooTests
}

def registerCapybaraE2eLinkTask = { String taskName, String taskDescription, String outputTypeName, capybaraInputDir, capybaraLinkedOutputDir, capybaraGeneratedOutputDir ->
    tasks.register(taskName, InProcessCapybaraCompileTask) {
        group = 'build'
        description = taskDescription
        dependsOn project(':lib:capybara-lib').tasks.named('linkCapybaraLinked')
        dependsOn ':capy:classes'
        dependsOn ':compiler:classes'

        runtimeClasspath.from(capyRuntimeClasspath)
        inputDir.set(capybaraInputDir)
        additionalInputDirs.from(capybaraLibLinkedDir)
        linkedOutputDir.set(capybaraLinkedOutputDir)
        generatedOutputDir.set(capybaraGeneratedOutputDir)
        includeJavaLibResources.set(false)
        compilerVersion.set(project.version.toString())
        getOutputTypeName().set(outputTypeName)
    }
}

def linkCapybaraE2eCfunSources = registerCapybaraE2eLinkTask(
        'linkCapybaraE2eCfunSources',
        'Compiles functional e2e-test Capybara files and generates Java in one pass without launching a separate JVM.',
        'JAVA',
        e2eCfunCapybaraSourceDir,
        e2eCfunLinkedOutputDir,
        e2eCfunGeneratedJavaDir
)
def linkCapybaraE2eCfunJsSources = registerCapybaraE2eLinkTask(
        'linkCapybaraE2eCfunJsSources',
        'Compiles functional e2e-test Capybara files and generates JavaScript in one pass without launching a separate JVM.',
        'JAVASCRIPT',
        e2eCfunCapybaraSourceDir,
        e2eCfunLinkedJsOutputDir,
        e2eCfunGeneratedJsDir
)
def linkCapybaraE2eCooSources = registerCapybaraE2eLinkTask(
        'linkCapybaraE2eCooSources',
        'Compiles object-oriented e2e-test Capybara files and generates Java in one pass without launching a separate JVM.',
        'JAVA',
        e2eCooCapybaraSourceDir,
        e2eCooLinkedOutputDir,
        e2eCooGeneratedJavaDir
)

tasks.named('compileE2eCfunJava') {
    dependsOn linkCapybaraE2eCfunSources
}

tasks.named('e2e-cfun-js') {
    dependsOn linkCapybaraE2eCfunJsSources
}

tasks.named('compileE2eCooJava') {
    dependsOn linkCapybaraE2eCooSources
}

jar {
    manifest {
        attributes('Main-Class': application.mainClass.get())
    }
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
    dependsOn configurations.runtimeClasspath
    dependsOn ':compiler:classes'
    from compilerClassesDir
    from compilerResourcesDir
    from {
        configurations.runtimeClasspath
                .findAll { it.exists() }
                .collect { it.isDirectory() ? it : zipTree(it) }
    }
}

def isWindows = System.getProperty('os.name').toLowerCase().contains('windows')
def nativeImageExecutableName = isWindows ? 'native-image.cmd' : 'native-image'
def nativeBinaryBaseName = "capyc-${project.version}"
def nativeBinaryName = isWindows ? "${nativeBinaryBaseName}.exe" : nativeBinaryBaseName

tasks.register('nativeCompile', Exec) {
    group = 'build'
    description = 'Builds a GraalVM native binary for the CLI application.'

    dependsOn tasks.named('jar')

    def outputDir = layout.buildDirectory.dir('native/nativeCompile')
    def outputBinary = outputDir.map { it.file(nativeBinaryName).asFile }

    inputs.files(
            tasks.named('jar').flatMap { it.archiveFile },
            sourceSets.main.runtimeClasspath
    )
    outputs.file(outputBinary)

    doFirst {
        var javaHome = System.getenv('GRAALVM_HOME') ?: System.getenv('JAVA_HOME')
        if (javaHome == null || javaHome.isBlank()) {
            throw new GradleException('Set GRAALVM_HOME (or JAVA_HOME pointing to GraalVM) to build native binary.')
        }

        var nativeImage = new File(javaHome, "bin/${nativeImageExecutableName}")
        if (!nativeImage.exists()) {
            throw new GradleException("native-image not found at `${nativeImage}`. Install GraalVM Native Image.")
        }

        var jarFile = tasks.named('jar').get().archiveFile.get().asFile
        var classpath = files(jarFile, sourceSets.main.runtimeClasspath).asPath
        var output = outputBinary.get()
        output.parentFile.mkdirs()

        commandLine(
                nativeImage.absolutePath,
                '--no-fallback',
                '-cp', classpath,
                application.mainClass.get(),
                output.absolutePath
        )
    }
}
