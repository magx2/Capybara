tasks.register('pythonNativeParserSmoke', Exec) {
    description = 'Runs the generated Python compiler parser through the Python native parser implementation.'
    group = 'verification'
    dependsOn generatePythonCompiler
    dependsOn tasks.named('generatePythonAntlr')
    dependsOn tasks.named('installPythonAntlrRuntime')

    inputs.file(pythonNativeParserSmokeScript)
            .withPropertyName('pythonNativeParserSmokeScript')
            .withPathSensitivity(PathSensitivity.RELATIVE)
    inputs.dir(capybaraGeneratedCompilerPythonDir)
            .withPropertyName('generatedPythonCompiler')
            .withPathSensitivity(PathSensitivity.RELATIVE)
    inputs.dir(capybaraMainNativePythonSourceDir)
            .withPropertyName('mainNativePythonSources')
            .withPathSensitivity(PathSensitivity.RELATIVE)
    inputs.dir(pythonAntlrGeneratedDir)
            .withPropertyName('pythonAntlrGeneratedSources')
            .withPathSensitivity(PathSensitivity.RELATIVE)
    inputs.dir(pythonAntlrRuntimeDir)
            .withPropertyName('pythonAntlrRuntime')
            .withPathSensitivity(PathSensitivity.RELATIVE)
    outputs.dir(pythonNativeParserSmokeResultsDir)

    doFirst {
        def outputDir = pythonNativeParserSmokeResultsDir.get().asFile
        outputDir.mkdirs()
        def pythonPathEntries = [
                capybaraGeneratedCompilerPythonDir.get().asFile.absolutePath,
                capybaraMainNativePythonSourceDir.asFile.absolutePath,
                pythonAntlrGeneratedDir.get().asFile.absolutePath,
                pythonAntlrRuntimeDir.get().asFile.absolutePath
        ]
        def existingPythonPath = System.getenv('PYTHONPATH')
        if (existingPythonPath != null && !existingPythonPath.isBlank()) {
            pythonPathEntries.add(existingPythonPath)
        }
        commandLine systemPythonExecutable(), pythonNativeParserSmokeScript.asFile.absolutePath
        environment 'PYTHONPATH', pythonPathEntries.join(File.pathSeparator)
        environment 'PYTHON_NATIVE_PARSER_SMOKE_OUTPUT', outputDir.absolutePath
    }
}

tasks.register('javascriptNativeParserSmoke', Exec) {
    description = 'Runs the generated JavaScript compiler parser through the JavaScript native parser implementation.'
    group = 'verification'
    dependsOn prepareJavaScriptCompilerRuntime
    dependsOn tasks.named('generateJavaScriptAntlr')
    dependsOn tasks.named('installJavaScriptAntlrRuntime')

    inputs.file(javascriptNativeParserSmokeScript)
            .withPropertyName('javascriptNativeParserSmokeScript')
            .withPathSensitivity(PathSensitivity.RELATIVE)
    inputs.dir(capybaraRuntimeCompilerJavaScriptDir)
            .withPropertyName('runtimeJavaScriptCompiler')
            .withPathSensitivity(PathSensitivity.RELATIVE)
    inputs.dir(javascriptAntlrGeneratedDir)
            .withPropertyName('javascriptAntlrGeneratedSources')
            .withPathSensitivity(PathSensitivity.RELATIVE)
    inputs.dir(javascriptAntlrRuntimeDir)
            .withPropertyName('javascriptAntlrRuntime')
            .withPathSensitivity(PathSensitivity.RELATIVE)
    outputs.dir(javascriptNativeParserSmokeResultsDir)

    doFirst {
        def outputDir = javascriptNativeParserSmokeResultsDir.get().asFile
        outputDir.mkdirs()
        def nodePathEntries = [
                capybaraRuntimeCompilerJavaScriptDir.get().asFile.absolutePath,
                javascriptAntlrGeneratedDir.get().asFile.absolutePath,
                new File(javascriptAntlrRuntimeDir.get().asFile, 'node_modules').absolutePath
        ]
        def existingNodePath = System.getenv('NODE_PATH')
        if (existingNodePath != null && !existingNodePath.isBlank()) {
            nodePathEntries.add(existingNodePath)
        }
        commandLine 'node', javascriptNativeParserSmokeScript.asFile.absolutePath
        environment 'NODE_PATH', nodePathEntries.join(File.pathSeparator)
        environment 'JAVASCRIPT_NATIVE_PARSER_SMOKE_OUTPUT', outputDir.absolutePath
    }
}

