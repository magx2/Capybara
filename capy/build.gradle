// Backend e2e generation uses the same parser/compiler path as Java e2e generation.
// CapybaraParser.cfun, CapybaraParser.coo, and the current native parser bridge feed
// the parser model consumed by CapybaraCompiler.cfun. These tasks compile/link real
// CompiledProgram data before generation, preserving modules, imports, functions,
// types, diagnostics, and native/provider metadata.
//
// PythonGenerator.cfun is expected to emit package-mapped .py files under the
// generated Python directory, including capy/test/CapyTestRuntime.py test entrypoints,
// runtime helpers, and native-provider imports that can resolve the native/py fixture
// root on PYTHONPATH.
//
// JavaScriptGenerator.cfun is expected to emit package-mapped .js files under the
// generated JavaScript directories, with module paths mirroring Capybara package paths
// such as dev/capylang/test/Foo.js plus capy/test/CapyTestRuntime.js. The runtime
// exposes gatherTests() for the shared Node runner, emits helper modules beside the
// generated code, and resolves native-provider bindings from CompiledProgram native
// metadata to module/export/factory entries that can load the generated root and the
// src/e2e-coo/native/js fixture root via NODE_PATH.
def registerCapybaraE2eGenerationTask = { String taskName, String taskDescription, String outputTypeName, capybaraInputDir, capybaraLinkedOutputDir, capybaraGeneratedOutputDir ->
    tasks.register(taskName, InProcessCapybaraCompileTask) {
        group = 'build'
        description = taskDescription
        dependsOn project(':lib:capybara-lib').tasks.named('linkCapybaraLinked')
        dependsOn ':capy:classes'

        runtimeClasspath.from(capyRuntimeClasspath)
        getInputDir().set(capybaraInputDir)
        additionalInputDirs.from(capybaraLibLinkedDir)
        getLinkedOutputDir().set(capybaraLinkedOutputDir)
        getGeneratedOutputDir().set(capybaraGeneratedOutputDir)
        compilerVersion.set(project.version.toString())
        getOutputTypeName().set(outputTypeName)
    }
}

