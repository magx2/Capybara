abstract class InProcessCapybaraCompileTask extends DefaultTask {
    @Classpath
    abstract ConfigurableFileCollection getRuntimeClasspath()

    @InputDirectory
    @PathSensitive(PathSensitivity.RELATIVE)
    abstract DirectoryProperty getInputDir()

    @InputFiles
    @PathSensitive(PathSensitivity.RELATIVE)
    abstract ConfigurableFileCollection getAdditionalInputDirs()

    @OutputDirectory
    abstract DirectoryProperty getLinkedOutputDir()

    @OutputDirectory
    abstract DirectoryProperty getGeneratedOutputDir()

    @Input
    abstract Property<String> getCompilerVersion()

    @Input
    abstract Property<String> getOutputTypeName()

    @TaskAction
    void compileCapybara() {
        def errors = new ByteArrayOutputStream()
        def runtimeUrls = runtimeClasspath.files.collect { it.toURI().toURL() } as URL[]
        URLClassLoader classLoader = new URLClassLoader(runtimeUrls, ClassLoader.getPlatformClassLoader())
        try {
            def capyClass = Class.forName('dev.capylang.Capy', true, classLoader)
            def readLinkedProgram = capyClass.getDeclaredMethod('readLinkedProgram', Path, Boolean.TYPE)
            readLinkedProgram.accessible = true
            def outputTypeClass = Class.forName('dev.capylang.compiler.OutputType', true, classLoader)
            def outputType = outputTypeClass.enumConstants.find { it.name() == outputTypeName.getOrElse('JAVA') }
            if (outputType == null) {
                throw new GradleException("Unknown Capybara output type: ${outputTypeName.getOrElse('JAVA')}")
            }
            def compileGenerate = capyClass.getMethod(
                    'compileGenerate',
                    outputTypeClass,
                    Path,
                    Path,
                    Path,
                    Path,
                    Path,
                    TreeSet,
                    Boolean.TYPE,
                    Boolean.TYPE,
                    String,
                    PrintStream
            )

            def libraries = new TreeSet()
            additionalInputDirs.files.each { libraryDir ->
                Path libraryPath = libraryDir.toPath()
                if (Files.notExists(libraryPath) || !Files.isDirectory(libraryPath)) {
                    return
                }
                def program = readLinkedProgram.invoke(null, libraryPath, false)
                libraries.addAll(program.modules())
            }

            def exitCode = compileGenerate.invoke(
                    null,
                    outputType,
                    inputDir.get().asFile.toPath(),
                    generatedOutputDir.get().asFile.toPath(),
                    linkedOutputDir.get().asFile.toPath(),
                    null,
                    null,
                    libraries,
                    true,
                    false,
                    compilerVersion.get(),
                    new PrintStream(errors)
            ) as Integer
            if (exitCode != 0) {
                def message = errors.toString().trim()
                throw new GradleException(message ?: "Capybara compile failed with exit code ${exitCode}")
            }
        } finally {
            classLoader.close()
        }
    }
}

abstract class CapybaraPythonTestTask extends DefaultTask {
    @Inject
    abstract ExecOperations getExecOperations()

    @InputFile
    @PathSensitive(PathSensitivity.RELATIVE)
    abstract RegularFileProperty getRunnerFile()

    @InputDirectory
    @PathSensitive(PathSensitivity.RELATIVE)
    abstract DirectoryProperty getGeneratedDir()

    @InputFiles
    @PathSensitive(PathSensitivity.RELATIVE)
    abstract ConfigurableFileCollection getPythonPathDirs()

    @OutputDirectory
    abstract DirectoryProperty getOutputDir()

    @Internal
    abstract DirectoryProperty getExecutionDir()

    @Input
    abstract Property<String> getReportType()

    @Input
    abstract Property<String> getLogType()

    @Input
    abstract ListProperty<String> getTests()

    @Input
    abstract Property<Boolean> getPrintAvailableTests()

    @Input
    abstract Property<String> getOperatingSystemName()

    @Input
    abstract Property<String> getExistingPythonPath()

    @Option(option = 'tests', description = 'Run only matching Capybara tests. Can be provided multiple times.')
    void addTest(String test) {
        getTests().add(test)
    }

    @Option(option = 'available-tests', description = 'Print available Capybara tests without running them.')
    void setAvailableTests(boolean availableTests) {
        getPrintAvailableTests().set(availableTests)
    }

    @TaskAction
    void runPythonTests() {
        if (!printAvailableTests.getOrElse(false)) {
            def directory = outputDir.get().asFile
            if (directory.exists()) {
                directory.deleteDir()
            }
            directory.mkdirs()
        }

        def command = [
                pythonExecutable(operatingSystemName.get()),
                runnerFile.get().asFile.absolutePath,
                '--generated-dir', generatedDir.get().asFile.absolutePath,
                '--output-dir', outputDir.get().asFile.absolutePath,
                '--report-type', reportType.get()
        ]
        def configuredLogType = logType.getOrElse('NONE')
        if (!configuredLogType.isBlank() && !configuredLogType.equalsIgnoreCase('NONE')) {
            command.addAll(['--log', configuredLogType])
        }
        tests.getOrElse([]).each { test ->
            command.addAll(['--tests', test])
        }
        if (printAvailableTests.getOrElse(false)) {
            command.add('--available-tests')
        }

        def pythonPathEntries = pythonPathDirs.files.findAll { it.exists() }.collect { it.absolutePath }
        def existingPythonPath = getExistingPythonPath().getOrElse('')
        if (!existingPythonPath.isBlank()) {
            pythonPathEntries.add(existingPythonPath)
        }

        getExecOperations().exec { execSpec ->
            execSpec.workingDir(getExecutionDir().get().asFile)
            execSpec.commandLine(command)
            if (!pythonPathEntries.isEmpty()) {
                execSpec.environment 'PYTHONPATH', pythonPathEntries.join(File.pathSeparator)
            }
        }
    }

    private static String pythonExecutable(String osName) {
        def normalized = osName.toLowerCase(Locale.ROOT)
        if (normalized.contains('linux')) {
            return 'python3'
        }
        if (normalized.contains('windows')) {
            return 'python.exe'
        }
        throw new GradleException("Python e2e tasks support Linux and Windows only. Current OS: ${osName}")
    }
}

abstract class InProcessCapybaraTestTask extends DefaultTask {
    @Classpath
    abstract ConfigurableFileCollection getRuntimeClasspath()

    @OutputDirectory
    abstract DirectoryProperty getOutputDir()

    @Input
    abstract Property<String> getReportType()

    @Input
    abstract Property<String> getLogType()

    @Input
    abstract ListProperty<String> getTests()

    @Input
    abstract Property<Boolean> getPrintAvailableTests()

    @Option(option = 'tests', description = 'Run only matching Capybara tests. Can be provided multiple times.')
    void addTest(String test) {
        getTests().add(test)
    }

    @Option(option = 'available-tests', description = 'Print available Capybara tests without running them.')
    void setAvailableTests(boolean availableTests) {
        getPrintAvailableTests().set(availableTests)
    }

    @TaskAction
    void runCapybaraTests() {
        def directory = outputDir.get().asFile
        if (directory.exists()) {
            directory.deleteDir()
        }
        directory.mkdirs()

        def runtimeUrls = runtimeClasspath.files.collect { it.toURI().toURL() } as URL[]
        URLClassLoader classLoader = new URLClassLoader(runtimeUrls, ClassLoader.getPlatformClassLoader())
        def originalContextClassLoader = Thread.currentThread().contextClassLoader
        try {
            Thread.currentThread().contextClassLoader = classLoader
            def testRunnerClass = Class.forName('dev.capylang.test.TestRunner', true, classLoader)
            def argumentsClass = Class.forName('dev.capylang.test.TestRunner$Arguments', true, classLoader)
            def parseArguments = testRunnerClass.getMethod('parseArguments', String[].class)
            def runTests = testRunnerClass.getMethod('runTests', argumentsClass)
            def args = [
                    '--output-dir', outputDir.get().asFile.absolutePath,
                    '--report-type', reportType.get()
            ]
            def configuredLogType = logType.getOrElse('NONE')
            if (!configuredLogType.isBlank() && !configuredLogType.equalsIgnoreCase('NONE')) {
                args.addAll(['--log', configuredLogType])
            }
            tests.getOrElse([]).each { test ->
                args.addAll(['--tests', test])
            }
            if (printAvailableTests.getOrElse(false)) {
                args.add('--available-tests')
            }

            def parsedArguments = parseArguments.invoke(null, [args.toArray(new String[0])] as Object[])
            def exitCode = runTests.invoke(null, [parsedArguments] as Object[]) as Integer
            if (exitCode != 0) {
                throw new GradleException("Capybara tests failed with exit code ${exitCode}")
            }
        } finally {
            Thread.currentThread().contextClassLoader = originalContextClassLoader
            classLoader.close()
        }
    }
}

dependencies {
    antlr group: 'org.antlr', name: 'antlr4', version: antlrVersion
    implementation "dev.capylang:capybara-lib:${capybaraVersion}@jar"
    implementation 'com.fasterxml.jackson.core:jackson-databind:2.19.0'
    implementation 'com.fasterxml.jackson.datatype:jackson-datatype-jdk8:2.19.0'
    implementation group: 'org.antlr', name: 'antlr4-runtime', version: antlrVersion
    implementation 'org.yaml:snakeyaml:2.4'

    testImplementation 'org.assertj:assertj-core:3.27.6'
}

def capybaraProjectVersion = project.version.toString()
def javaLibSourceDir = rootProject.layout.projectDirectory.dir('lib/capybara-lib/src/main/java')
def capybaraStdlibLinkedDir = project(':lib:capybara-lib').layout.buildDirectory.dir('generated/sources/capybara/linked/main/capy')
def capyClassesDir = layout.buildDirectory.dir('classes/java/main')
def capyResourcesDir = layout.buildDirectory.dir('resources/main')
def capybaraLibLinkedDir = project(':lib:capybara-lib').layout.buildDirectory.dir('generated/sources/capybara/linked/main')

def e2eCfunCapybaraSourceDir = layout.projectDirectory.dir('src/e2e-cfun/capybara')
def e2eCfunGeneratedJavaDir = layout.buildDirectory.dir('generated/sources/capybara/java/e2e-cfun')
def e2eCfunGeneratedPythonDir = layout.buildDirectory.dir('generated/sources/capybara/python/e2e-cfun')
def e2eCfunLinkedOutputDir = layout.buildDirectory.dir('generated/sources/capybara/linked/e2e-cfun')
def e2eCfunLinkedPythonOutputDir = layout.buildDirectory.dir('generated/sources/capybara/linked-python/e2e-cfun')
def e2eCfunTestResultsDir = layout.buildDirectory.dir('test-results/e2e-cfun')
def e2eCfunPythonTestResultsDir = layout.buildDirectory.dir('test-results/e2e-python-cfun')
def e2eCooCapybaraSourceDir = layout.projectDirectory.dir('src/e2e-coo/capybara')
def e2eCooNativeSourceDir = layout.projectDirectory.dir('src/e2e-coo/native')
def e2eCooNativePythonSourceDir = layout.projectDirectory.dir('src/e2e-coo/native/py')
def e2eCooPreparedSourceDir = layout.buildDirectory.dir('generated/sources/capybara/e2e-coo')
def e2eCooGeneratedJavaDir = layout.buildDirectory.dir('generated/sources/capybara-e2e-coo/java')
def e2eCooGeneratedPythonDir = layout.buildDirectory.dir('generated/sources/capybara/python/e2e-coo')
def e2eCooLinkedOutputDir = layout.buildDirectory.dir('generated/sources/capybara-e2e-coo/linked')
def e2eCooLinkedPythonOutputDir = layout.buildDirectory.dir('generated/sources/capybara/linked-python/e2e-coo')
def e2eCooTestResultsDir = layout.buildDirectory.dir('test-results/e2e-coo')
def e2eCooPythonTestResultsDir = layout.buildDirectory.dir('test-results/e2e-python-coo')
def capybaraPythonTestRunner = project(':lib:capybara-lib').layout.projectDirectory.file('src/test/py/run-capybara-tests.py')
def capyRuntimeDependencies = configurations.runtimeClasspath.incoming.artifactView {
    componentFilter { componentIdentifier -> !(componentIdentifier instanceof ProjectComponentIdentifier) }
}.files
def capyRuntimeClasspath = files(
        capyClassesDir,
        capyResourcesDir,
        capyRuntimeDependencies
)

sourceSets {
    main {
        java {
            exclude 'e2e-*/**'
        }
    }
    integrationTest {
        java.srcDir file('src/integrationTest/java')
        resources.srcDir file('src/integrationTest/resources')
        compileClasspath += sourceSets.main.output + configurations.testRuntimeClasspath
        runtimeClasspath += output + compileClasspath
    }
    e2eCfun {
        java.srcDir e2eCfunGeneratedJavaDir
        resources.srcDir file('src/e2e-cfun/resources')
        compileClasspath += sourceSets.main.output + configurations.testRuntimeClasspath
        runtimeClasspath += output + compileClasspath
    }
    e2eCoo {
        java.srcDir e2eCooGeneratedJavaDir
        java.srcDir file('src/e2e-coo/native/java')
        resources.srcDir file('src/e2e-coo/resources')
        compileClasspath += sourceSets.main.output + configurations.testRuntimeClasspath
        runtimeClasspath += output + compileClasspath
    }
}

tasks.named('compileCapybara') {
    writeLinkedOutput.set(false)
    includeJavaLibResources.set(false)
}

configurations {
    integrationTestImplementation.extendsFrom testImplementation
    integrationTestRuntimeOnly.extendsFrom testRuntimeOnly
    e2eCfunImplementation.extendsFrom testImplementation
    e2eCfunRuntimeOnly.extendsFrom testRuntimeOnly
    e2eCooImplementation.extendsFrom testImplementation
    e2eCooRuntimeOnly.extendsFrom testRuntimeOnly
}

def e2eCfunRuntimeDependencies = configurations.e2eCfunRuntimeClasspath.incoming.artifactView {
    componentFilter { componentIdentifier -> !(componentIdentifier instanceof ProjectComponentIdentifier) }
}.files
def e2eCooRuntimeDependencies = configurations.e2eCooRuntimeClasspath.incoming.artifactView {
    componentFilter { componentIdentifier -> !(componentIdentifier instanceof ProjectComponentIdentifier) }
}.files

processResources {
    dependsOn ':lib:capybara-lib:linkCapybaraLinked'
    filesMatching('capybara-version.txt') {
        expand(version: capybaraProjectVersion)
    }
    from(javaLibSourceDir) {
        into 'java-lib-src'
    }
    from(capybaraStdlibLinkedDir) {
        into 'capy'
    }
}

application {
    mainClass = 'dev.capylang.Capy'
}

def integrationTests = tasks.register('integrationTest', Test) {
    description = 'Runs compiler integration tests.'
    group = 'verification'
    testClassesDirs = sourceSets.integrationTest.output.classesDirs
    classpath = sourceSets.integrationTest.runtimeClasspath
    shouldRunAfter test
    useJUnitPlatform()
}

def e2eCfunTests = tasks.register('e2e-cfun', InProcessCapybaraTestTask) {
    description = 'Runs functional Capybara e2e tests on Java.'
    group = 'verification'
    dependsOn tasks.named('compileE2eCfunJava')
    runtimeClasspath.from(files(
            sourceSets.e2eCfun.output,
            sourceSets.main.output,
            e2eCfunRuntimeDependencies
    ))
    outputDir.set(e2eCfunTestResultsDir)
    reportType.set('JUNIT')
    logType.set('TC')
    getTests().convention([])
    getPrintAvailableTests().convention(false)
    shouldRunAfter test
}

def e2eCooTests = tasks.register('e2e-coo', InProcessCapybaraTestTask) {
    description = 'Runs object-oriented Capybara e2e tests on Java.'
    group = 'verification'
    dependsOn tasks.named('compileE2eCooJava')
    runtimeClasspath.from(files(
            sourceSets.e2eCoo.output,
            sourceSets.main.output,
            e2eCooRuntimeDependencies
    ))
    outputDir.set(e2eCooTestResultsDir)
    reportType.set('JUNIT')
    logType.set('TC')
    getTests().convention([])
    getPrintAvailableTests().convention(false)
    shouldRunAfter test
}

tasks.register('e2eTests') {
    description = 'Runs Java Capybara e2e tests.'
    group = 'verification'
    dependsOn e2eCfunTests
    dependsOn e2eCooTests
}

def e2ePythonTests = tasks.register('e2e-python') {
    description = 'Runs Capybara e2e tests on Python.'
    group = 'verification'
}

check {
    dependsOn integrationTests
    dependsOn e2eCfunTests
    dependsOn e2eCooTests
}

def registerCapybaraE2eGenerationTask = { String taskName, String taskDescription, String outputTypeName, capybaraInputDir, capybaraLinkedOutputDir, capybaraGeneratedOutputDir ->
    tasks.register(taskName, InProcessCapybaraCompileTask) {
        group = 'build'
        description = taskDescription
        dependsOn project(':lib:capybara-lib').tasks.named('linkCapybaraLinked')
        dependsOn ':capy:classes'

        runtimeClasspath.from(capyRuntimeClasspath)
        getInputDir().set(capybaraInputDir)
        additionalInputDirs.from(capybaraLibLinkedDir)
        getLinkedOutputDir().set(capybaraLinkedOutputDir)
        getGeneratedOutputDir().set(capybaraGeneratedOutputDir)
        compilerVersion.set(project.version.toString())
        getOutputTypeName().set(outputTypeName)
    }
}

def linkCapybaraE2eCfunSources = registerCapybaraE2eGenerationTask(
        'linkCapybaraE2eCfunSources',
        'Compiles functional e2e-test Capybara files and generates Java in one pass without launching a separate JVM.',
        'JAVA',
        e2eCfunCapybaraSourceDir,
        e2eCfunLinkedOutputDir,
        e2eCfunGeneratedJavaDir
)

def generateE2ePythonCfun = registerCapybaraE2eGenerationTask(
        'generateE2ePythonCfun',
        'Compiles functional e2e-test Capybara files and generates Python in one pass without launching a separate JVM.',
        'PYTHON',
        e2eCfunCapybaraSourceDir,
        e2eCfunLinkedPythonOutputDir,
        e2eCfunGeneratedPythonDir
)

tasks.named('compileE2eCfunJava') {
    dependsOn linkCapybaraE2eCfunSources
}

def e2ePythonCfunTests = tasks.register('e2e-python-cfun', CapybaraPythonTestTask) {
    description = 'Runs functional Capybara e2e tests on Python.'
    group = 'verification'
    dependsOn generateE2ePythonCfun
    shouldRunAfter e2eCfunTests

    runnerFile.set(capybaraPythonTestRunner)
    generatedDir.set(e2eCfunGeneratedPythonDir)
    pythonPathDirs.from(e2eCfunGeneratedPythonDir)
    outputDir.set(e2eCfunPythonTestResultsDir)
    executionDir.set(layout.projectDirectory)
    reportType.set('JUNIT')
    logType.set('TC')
    operatingSystemName.set(providers.systemProperty('os.name'))
    existingPythonPath.set(providers.environmentVariable('PYTHONPATH').orElse(''))
    getTests().convention([])
    getPrintAvailableTests().convention(false)
}

e2ePythonTests.configure {
    dependsOn e2ePythonCfunTests
}

def prepareE2eCooSources = tasks.register('prepareE2eCooSources', Sync) {
    group = 'build'
    description = 'Prepares all object-oriented e2e Capybara sources in the compiler input-root layout.'

    from(e2eCooCapybaraSourceDir)
    from(e2eCooNativeSourceDir) {
        exclude 'js/**'
        into 'native'
    }
    into e2eCooPreparedSourceDir
}

def cleanE2eCooGeneratedSources = tasks.register('cleanE2eCooGeneratedSources', Delete) {
    group = 'build'
    description = 'Removes stale generated object-oriented e2e backend and linked files.'

    delete e2eCooGeneratedJavaDir
    delete e2eCooLinkedOutputDir
    delete e2eCooGeneratedPythonDir
    delete e2eCooLinkedPythonOutputDir
}

def linkCapybaraE2eCooSources = registerCapybaraE2eGenerationTask(
        'linkCapybaraE2eCooSources',
        'Compiles object-oriented e2e-test Capybara files and generates Java in one pass without launching a separate JVM.',
        'JAVA',
        e2eCooPreparedSourceDir,
        e2eCooLinkedOutputDir,
        e2eCooGeneratedJavaDir
)
linkCapybaraE2eCooSources.configure {
    dependsOn cleanE2eCooGeneratedSources
    dependsOn prepareE2eCooSources
    mustRunAfter cleanE2eCooGeneratedSources
    inputs.dir(e2eCooCapybaraSourceDir)
            .withPropertyName('e2eCooCapybaraSources')
            .withPathSensitivity(PathSensitivity.RELATIVE)
    inputs.dir(e2eCooNativeSourceDir)
            .withPropertyName('e2eCooNativeSources')
            .withPathSensitivity(PathSensitivity.RELATIVE)
}

def generateE2ePythonCoo = registerCapybaraE2eGenerationTask(
        'generateE2ePythonCoo',
        'Compiles object-oriented e2e-test Capybara files and generates Python in one pass without launching a separate JVM.',
        'PYTHON',
        e2eCooPreparedSourceDir,
        e2eCooLinkedPythonOutputDir,
        e2eCooGeneratedPythonDir
)
generateE2ePythonCoo.configure {
    dependsOn cleanE2eCooGeneratedSources
    dependsOn prepareE2eCooSources
    mustRunAfter cleanE2eCooGeneratedSources
    inputs.dir(e2eCooCapybaraSourceDir)
            .withPropertyName('e2eCooCapybaraSources')
            .withPathSensitivity(PathSensitivity.RELATIVE)
    inputs.dir(e2eCooNativeSourceDir)
            .withPropertyName('e2eCooNativeSources')
            .withPathSensitivity(PathSensitivity.RELATIVE)
}

tasks.named('compileE2eCooJava') {
    dependsOn linkCapybaraE2eCooSources
}

def e2ePythonCooTests = tasks.register('e2e-python-coo', CapybaraPythonTestTask) {
    description = 'Runs object-oriented Capybara e2e tests on Python.'
    group = 'verification'
    dependsOn generateE2ePythonCoo
    shouldRunAfter e2eCooTests

    runnerFile.set(capybaraPythonTestRunner)
    generatedDir.set(e2eCooGeneratedPythonDir)
    pythonPathDirs.from(e2eCooGeneratedPythonDir)
    pythonPathDirs.from(e2eCooNativePythonSourceDir)
    outputDir.set(e2eCooPythonTestResultsDir)
    executionDir.set(layout.projectDirectory)
    reportType.set('JUNIT')
    logType.set('TC')
    operatingSystemName.set(providers.systemProperty('os.name'))
    existingPythonPath.set(providers.environmentVariable('PYTHONPATH').orElse(''))
    getTests().convention([])
    getPrintAvailableTests().convention(false)
}

e2ePythonTests.configure {
    dependsOn e2ePythonCooTests
}

jar {
    manifest {
        attributes('Main-Class': application.mainClass.get())
    }
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
    dependsOn configurations.runtimeClasspath
    from {
        configurations.runtimeClasspath
                .findAll { it.exists() }
                .collect { it.isDirectory() ? it : zipTree(it) }
    }
}
