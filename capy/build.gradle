def pythonEnvDir = providers.provider {
    def osName = System.getProperty('os.name').toLowerCase(Locale.ROOT)
    def pythonOs = osName.contains('windows') ? 'Windows' : osName.contains('mac') ? 'MacOSX' : 'Linux'
    pythonPlugin.installDir.get()
            .dir("${pythonOs}/${pythonPlugin.condaInstaller.get()}-${pythonPlugin.condaVersion.get()}/envs/python-${pythonPlugin.pythonVersion.get()}")
            .asFile
}
def pythonExecutable = pythonEnvDir.map { envDir ->
    new File(envDir, System.getProperty('os.name').toLowerCase(Locale.ROOT).contains('windows') ? 'python.exe' : 'bin/python')
}
def pythonPath = pythonEnvDir.map { envDir ->
    def osName = System.getProperty('os.name').toLowerCase(Locale.ROOT)
    def pathEntries = osName.contains('windows')
            ? [
                    envDir,
                    new File(envDir, 'Library/mingw-w64/bin'),
                    new File(envDir, 'Library/usr/bin'),
                    new File(envDir, 'Library/bin'),
                    new File(envDir, 'Scripts')
            ]
            : [new File(envDir, 'bin')]
    (pathEntries.collect { it.absolutePath } + [System.getenv('PATH') ?: '']).join(File.pathSeparator)
}
def configurePythonTask = { Exec task ->
    task.dependsOn tasks.named('envSetup')
    task.executable = pythonExecutable.get().absolutePath
    task.environment 'CONDA_PREFIX', pythonEnvDir.get().absolutePath
    task.environment 'PATH', pythonPath.get()
}

// The Python plugin's IDE SDK import finalizer runs locatePython during normal
// builds when .idea exists. Test tasks run the environment Python directly.
def pythonSdkImportRequested = gradle.startParameter.taskNames.any { taskName ->
    def separator = taskName.lastIndexOf(':')
    def basename = separator >= 0 ? taskName.substring(separator + 1) : taskName
    basename == 'locatePython' || basename == 'saveSdkImportConfig'
}

tasks.named('locatePython') {
    onlyIf { pythonSdkImportRequested }
}

tasks.named('saveSdkImportConfig') {
    onlyIf { pythonSdkImportRequested }
}

abstract class InProcessCapybaraCompileTask extends DefaultTask {
    @Classpath
    abstract ConfigurableFileCollection getRuntimeClasspath()

    @InputDirectory
    @PathSensitive(PathSensitivity.RELATIVE)
    abstract DirectoryProperty getInputDir()

    @InputFiles
    @PathSensitive(PathSensitivity.RELATIVE)
    abstract ConfigurableFileCollection getAdditionalInputDirs()

    @OutputDirectory
    abstract DirectoryProperty getLinkedOutputDir()

    @OutputDirectory
    abstract DirectoryProperty getGeneratedOutputDir()

    @Input
    abstract Property<Boolean> getIncludeJavaLibResources()

    @Input
    abstract Property<Boolean> getCompileTests()

    @Input
    abstract Property<String> getCompilerVersion()

    @Input
    abstract Property<String> getOutputTypeName()

    @Optional
    @InputFile
    @PathSensitive(PathSensitivity.RELATIVE)
    abstract RegularFileProperty getNativeWiringFile()

    @TaskAction
    void compileCapybara() {
        def errors = new ByteArrayOutputStream()
        def runtimeUrls = runtimeClasspath.files.collect { it.toURI().toURL() } as URL[]
        URLClassLoader classLoader = new URLClassLoader(runtimeUrls, ClassLoader.getPlatformClassLoader())
        try {
            def capyClass = Class.forName('dev.capylang.Capy', true, classLoader)
            def readLinkedProgram = capyClass.getDeclaredMethod('readLinkedProgram', Path, Boolean.TYPE)
            readLinkedProgram.accessible = true
            def outputTypeClass = Class.forName('dev.capylang.compiler.OutputType', true, classLoader)
            def nativeProviderManifestClass = Class.forName('dev.capylang.compiler.NativeProviderManifest', true, classLoader)
            def readNativeProviderManifest = capyClass.getDeclaredMethod('readNativeProviderManifest', Path)
            readNativeProviderManifest.accessible = true
            def outputType = outputTypeClass.enumConstants.find { it.name() == outputTypeName.get() }
            def compileGenerate = capyClass.getMethod(
                    'compileGenerate',
                    outputTypeClass,
                    Path,
                    Path,
                    Path,
                    Path,
                    Path,
                    TreeSet,
                    Boolean.TYPE,
                    Boolean.TYPE,
                    String,
                    PrintStream
            )
            def compileGenerateWithNativeWiring = capyClass.getMethod(
                    'compileGenerate',
                    outputTypeClass,
                    Path,
                    Path,
                    Path,
                    Path,
                    Path,
                    TreeSet,
                    Boolean.TYPE,
                    Boolean.TYPE,
                    nativeProviderManifestClass,
                    String,
                    PrintStream
            )

            def libraries = new TreeSet()
            additionalInputDirs.files.each { libraryDir ->
                Path libraryPath = libraryDir.toPath()
                if (Files.notExists(libraryPath) || !Files.isDirectory(libraryPath)) {
                    return
                }
                def program = readLinkedProgram.invoke(null, libraryPath, false)
                libraries.addAll(program.modules())
            }

            def nativeProviders = nativeWiringFile.present
                    ? readNativeProviderManifest.invoke(null, nativeWiringFile.get().asFile.toPath())
                    : null
            def exitCode = nativeProviders == null
                    ? compileGenerate.invoke(
                            null,
                            outputType,
                            inputDir.get().asFile.toPath(),
                            generatedOutputDir.get().asFile.toPath(),
                            linkedOutputDir.get().asFile.toPath(),
                            null,
                            null,
                            libraries,
                            compileTests.getOrElse(false),
                            includeJavaLibResources.getOrElse(true),
                            compilerVersion.get(),
                            new PrintStream(errors)
                    ) as Integer
                    : compileGenerateWithNativeWiring.invoke(
                            null,
                            outputType,
                            inputDir.get().asFile.toPath(),
                            generatedOutputDir.get().asFile.toPath(),
                            linkedOutputDir.get().asFile.toPath(),
                            null,
                            null,
                            libraries,
                            compileTests.getOrElse(false),
                            includeJavaLibResources.getOrElse(true),
                            nativeProviders,
                            compilerVersion.get(),
                            new PrintStream(errors)
                    ) as Integer
            if (exitCode != 0) {
                def message = errors.toString().trim()
                throw new GradleException(message ?: "Capybara compile failed with exit code ${exitCode}")
            }
        } finally {
            classLoader.close()
        }
    }
}

abstract class InProcessCapybaraTestTask extends DefaultTask {
    @Classpath
    abstract ConfigurableFileCollection getRuntimeClasspath()

    @OutputDirectory
    abstract DirectoryProperty getOutputDir()

    @Input
    abstract Property<String> getReportType()

    @Input
    abstract Property<String> getLogType()

    @Input
    abstract ListProperty<String> getTests()

    @Input
    abstract Property<Boolean> getPrintAvailableTests()

    @Option(option = 'tests', description = 'Run only matching Capybara tests. Can be provided multiple times.')
    void addTest(String test) {
        getTests().add(test)
    }

    @Option(option = 'available-tests', description = 'Print available Capybara tests without running them.')
    void setAvailableTests(boolean availableTests) {
        getPrintAvailableTests().set(availableTests)
    }

    @TaskAction
    void runCapybaraTests() {
        def directory = outputDir.get().asFile
        if (directory.exists()) {
            directory.deleteDir()
        }
        directory.mkdirs()

        def runtimeUrls = runtimeClasspath.files.collect { it.toURI().toURL() } as URL[]
        URLClassLoader classLoader = new URLClassLoader(runtimeUrls, ClassLoader.getPlatformClassLoader())
        def originalContextClassLoader = Thread.currentThread().contextClassLoader
        try {
            Thread.currentThread().contextClassLoader = classLoader
            def testRunnerClass = Class.forName('dev.capylang.test.TestRunner', true, classLoader)
            def argumentsClass = Class.forName('dev.capylang.test.TestRunner$Arguments', true, classLoader)
            def parseArguments = testRunnerClass.getMethod('parseArguments', String[].class)
            def runTests = testRunnerClass.getMethod('runTests', argumentsClass)
            def args = [
                    '--output-dir', outputDir.get().asFile.absolutePath,
                    '--report-type', reportType.get()
            ]
            def configuredLogType = logType.getOrElse('NONE')
            if (!configuredLogType.isBlank() && !configuredLogType.equalsIgnoreCase('NONE')) {
                args.addAll(['--log', configuredLogType])
            }
            tests.getOrElse([]).each { test ->
                args.addAll(['--tests', test])
            }
            if (printAvailableTests.getOrElse(false)) {
                args.add('--available-tests')
            }

            def parsedArguments = parseArguments.invoke(null, [args.toArray(new String[0])] as Object[])
            def exitCode = runTests.invoke(null, [parsedArguments] as Object[]) as Integer
            if (exitCode != 0) {
                throw new GradleException("Capybara tests failed with exit code ${exitCode}")
            }
        } finally {
            Thread.currentThread().contextClassLoader = originalContextClassLoader
            classLoader.close()
        }
    }
}

