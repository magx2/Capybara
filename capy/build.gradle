    classpath = sourceSets.integrationTest.runtimeClasspath
    shouldRunAfter test
    useJUnitPlatform()
}

def registerE2eTestTask = { String taskName, String taskDescription, sourceSet, runtimeDependencies, String compileJavaTaskName, testResultsDir ->
    tasks.register(taskName, InProcessCapybaraTestTask) {
        description = taskDescription
        group = 'verification'
        dependsOn ':lib:capybara-lib:classes'
        dependsOn tasks.named(compileJavaTaskName)
        runtimeClasspath.from(files(
                sourceSet.output,
                sourceSets.main.output,
                capybaraLibClassesDir,
                capybaraLibResourcesDir,
                runtimeDependencies
        ))
        outputDir.set(testResultsDir)
        reportType.set('JUNIT')
        logType.set('TC')
        getTests().convention([])
        getPrintAvailableTests().convention(false)
        shouldRunAfter test
    }
}

