def registerCapybaraE2eGenerationTask = { String taskName, String taskDescription, String outputTypeName, capybaraInputDir, capybaraLinkedOutputDir, capybaraGeneratedOutputDir ->
    tasks.register(taskName, InProcessCapybaraCompileTask) {
        group = 'build'
        description = taskDescription
        dependsOn project(':lib:capybara-lib').tasks.named('linkCapybaraLinked')
        dependsOn ':capy:classes'

        runtimeClasspath.from(capyRuntimeClasspath)
        getInputDir().set(capybaraInputDir)
        additionalInputDirs.from(capybaraLibLinkedDir)
        getLinkedOutputDir().set(capybaraLinkedOutputDir)
        getGeneratedOutputDir().set(capybaraGeneratedOutputDir)
        compilerVersion.set(project.version.toString())
        getOutputTypeName().set(outputTypeName)
    }
}

