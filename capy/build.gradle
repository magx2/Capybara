tasks.register('generateJavaScriptAntlr') {
    group = 'build'
    description = 'Converts ANTLR JavaScript parser sources to CommonJS for the Capybara JavaScript backend.'
    dependsOn tasks.named('generateJavaScriptAntlrEsm')

    inputs.dir(javascriptAntlrEsmGeneratedDir)
            .withPropertyName('javascriptAntlrEsmSources')
            .withPathSensitivity(PathSensitivity.RELATIVE)
    outputs.dir(javascriptAntlrGeneratedDir)

    doLast {
        def inputDir = javascriptAntlrEsmGeneratedDir.get().asFile
        def outputDir = javascriptAntlrGeneratedDir.get().asFile
        outputDir.deleteDir()
        outputDir.mkdirs()
        inputDir.eachFile { sourceFile ->
            def targetFile = new File(outputDir, sourceFile.name)
            if (!sourceFile.name.endsWith('.js')) {
                targetFile.bytes = sourceFile.bytes
                return
            }
            def source = sourceFile.text
            source = source.replace("import antlr4 from 'antlr4';", "const antlr4 = require('antlr4').default;")
            source = source.replaceAll(/import (\w+) from '\.\/(\w+)\.js';/, "const \$1 = require('./\$2.js');")
            def matcher = source =~ /export default class (\w+)/
            if (matcher.find()) {
                def className = matcher.group(1)
                source = source.replace("export default class ${className}", "class ${className}")
                source += System.lineSeparator() + "module.exports = ${className};" + System.lineSeparator()
            }
            targetFile.text = source
        }
    }
}

tasks.register('installPythonAntlrRuntime', Exec) {
    group = 'build'
    description = 'Installs the Python ANTLR runtime matching the ANTLR tool version.'

    inputs.property('antlrVersion', antlrToolVersion)
    outputs.dir(pythonAntlrRuntimeDir)

    doFirst {
        def outputDir = pythonAntlrRuntimeDir.get().asFile
        outputDir.mkdirs()
        def installer = '''
import io
import json
import shutil
import sys
import urllib.request
import zipfile
from pathlib import Path

version = sys.argv[1]
target = Path(sys.argv[2])
target.mkdir(parents=True, exist_ok=True)
metadata_url = f"https://pypi.org/pypi/antlr4-python3-runtime/{version}/json"
with urllib.request.urlopen(metadata_url) as response:
    metadata = json.loads(response.read().decode("utf-8"))
wheel_url = None
for file_info in metadata["urls"]:
    if file_info.get("packagetype") == "bdist_wheel":
        wheel_url = file_info["url"]
        break
if wheel_url is None:
    raise SystemExit(f"No wheel found for antlr4-python3-runtime {version}")
with urllib.request.urlopen(wheel_url) as response:
    wheel = response.read()
for child in target.iterdir():
    if child.is_dir():
        shutil.rmtree(child)
    else:
        child.unlink()
with zipfile.ZipFile(io.BytesIO(wheel)) as archive:
    archive.extractall(target)
'''
        commandLine systemPythonExecutable(), '-c', installer, antlrToolVersion, outputDir.absolutePath
    }
}

