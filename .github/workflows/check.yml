name: Build & Check

on:
  push:
    branches:
      - "**"
      - "!merge-back/**"
    paths:
      - ".github/workflows/**"
      - "build-tool/**"
      - "buildSrc/**"
      - "capy/**"
      - "gradle/**"
      - "lib/**"
      - "settings.gradle"
      - "gradle.properties"
      - "gradlew"
      - "gradlew.bat"
  pull_request:
    paths:
      - ".github/workflows/**"
      - "build-tool/**"
      - "buildSrc/**"
      - "capy/**"
      - "gradle/**"
      - "lib/**"
      - "settings.gradle"
      - "gradle.properties"
      - "gradlew"
      - "gradlew.bat"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-check:
    name: build-check (${{ matrix.os }})
    if: ${{ github.event_name != 'push' || !startsWith(github.ref_name, 'merge-back/') }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-disabled: false

      - name: Make Gradle wrapper executable
        if: runner.os != 'Windows'
        run: chmod +x gradlew

      - name: Run Gradle check on Linux
        if: runner.os != 'Windows'
        run: ./gradlew clean check --no-daemon

      - name: Run Gradle check on Windows
        if: runner.os == 'Windows'
        run: .\gradlew.bat clean check --no-daemon

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-check-test-reports-${{ matrix.os }}
          path: |
            **/build/reports/tests/**
            **/build/test-results/**/*.xml
          if-no-files-found: ignore
          retention-days: 5
