plugins {
    id 'buildlogic.java-library-conventions'
}

def capybaraMainSourceDir = layout.projectDirectory.dir('src/main/capybara')
def capybaraTestSourceDir = layout.projectDirectory.dir('src/test/capybara')
def capybaraCombinedTestSourceDir = layout.buildDirectory.dir('tmp/capybara/test-sources')
def capybaraGeneratedMainDir = layout.buildDirectory.dir('generated/sources/capybara/java/main')
def capybaraGeneratedTestDir = layout.buildDirectory.dir('generated/sources/capybara/java/test')
def capybaraLinkedMainDir = layout.buildDirectory.dir('generated/sources/capybara/linked/main')
def capybaraLinkedTestDir = layout.buildDirectory.dir('generated/sources/capybara/linked/test')
def capybaraDebugEnabled = gradle.startParameter.logLevel == org.gradle.api.logging.LogLevel.DEBUG

def prepareEmptyDir = { File dir ->
    if (dir.exists()) {
        java.nio.file.Files.walk(dir.toPath())
                .sorted(java.util.Comparator.reverseOrder())
                .forEach { path ->
                    if (path != dir.toPath()) {
                        java.nio.file.Files.deleteIfExists(path)
                    }
                }
    } else {
        dir.mkdirs()
    }
}

tasks.register('syncTestCapybaraSources', Sync) {
    from(capybaraMainSourceDir)
    from(capybaraTestSourceDir)
    into(capybaraCombinedTestSourceDir)
}

tasks.register('linkCapybara', JavaExec) {
    group = 'build'
    description = 'Compiles Capybara files from src/main/capybara into linked JSON artifacts.'

    inputs.dir(capybaraMainSourceDir)
    outputs.dir(capybaraLinkedMainDir)

    classpath = project(':capy').sourceSets.main.runtimeClasspath
    mainClass = 'pl.grzeslowski.capybara.Capy'

    doFirst {
        prepareEmptyDir(capybaraLinkedMainDir.get().asFile)
        def capybaraArgs = ['compile', '-i', capybaraMainSourceDir.asFile.absolutePath, '-o', capybaraLinkedMainDir.get().asFile.absolutePath]
        if (capybaraDebugEnabled) {
            capybaraArgs.addAll(['--log', 'DEBUG'])
        }
        setArgs(capybaraArgs)
    }
}

tasks.register('compileCapybara', JavaExec) {
    group = 'build'
    description = 'Generates Java from linked main Capybara sources.'
    dependsOn tasks.named('linkCapybara')

    inputs.dir(capybaraLinkedMainDir)
    outputs.dir(capybaraGeneratedMainDir)

    classpath = project(':capy').sourceSets.main.runtimeClasspath
    mainClass = 'pl.grzeslowski.capybara.Capy'

    doFirst {
        prepareEmptyDir(capybaraGeneratedMainDir.get().asFile)
        def capybaraArgs = ['generate', 'java', '-i', capybaraLinkedMainDir.get().asFile.absolutePath, '-o', capybaraGeneratedMainDir.get().asFile.absolutePath]
        if (capybaraDebugEnabled) {
            capybaraArgs.addAll(['--log', 'DEBUG'])
        }
        setArgs(capybaraArgs)
    }
}

tasks.register('linkTestCapybara', JavaExec) {
    group = 'verification'
    description = 'Compiles merged main and test Capybara files into linked JSON artifacts.'
    dependsOn tasks.named('syncTestCapybaraSources')

    inputs.dir(capybaraMainSourceDir)
    inputs.dir(capybaraTestSourceDir)
    outputs.dir(capybaraLinkedTestDir)

    classpath = project(':capy').sourceSets.main.runtimeClasspath
    mainClass = 'pl.grzeslowski.capybara.Capy'

    doFirst {
        prepareEmptyDir(capybaraLinkedTestDir.get().asFile)
        def capybaraArgs = [
                'compile',
                '-i', capybaraCombinedTestSourceDir.get().asFile.absolutePath,
                '-o', capybaraLinkedTestDir.get().asFile.absolutePath
        ]
        if (capybaraDebugEnabled) {
            capybaraArgs.addAll(['--log', 'DEBUG'])
        }
        setArgs(capybaraArgs)
    }
}

tasks.register('compileTestCapybara', JavaExec) {
    group = 'verification'
    description = 'Generates Java from linked main+test Capybara sources.'
    dependsOn tasks.named('compileCapybara')
    dependsOn tasks.named('linkTestCapybara')

    inputs.dir(capybaraLinkedTestDir)
    outputs.dir(capybaraGeneratedTestDir)

    classpath = project(':capy').sourceSets.main.runtimeClasspath
    mainClass = 'pl.grzeslowski.capybara.Capy'

    doFirst {
        prepareEmptyDir(capybaraGeneratedTestDir.get().asFile)
        def capybaraArgs = ['generate', 'java', '-i', capybaraLinkedTestDir.get().asFile.absolutePath, '-o', capybaraGeneratedTestDir.get().asFile.absolutePath]
        if (capybaraDebugEnabled) {
            capybaraArgs.addAll(['--log', 'DEBUG'])
        }
        setArgs(capybaraArgs)
    }
}

tasks.register('runJsonTest', JavaExec) {
    group = 'verification'
    description = 'Runs `JsonTest` main function.'
    dependsOn tasks.named('compileTestCapybara')

    classpath = sourceSets.test.runtimeClasspath
    mainClass = 'lang.serialization.JsonTest'
}

tasks.register('runResultTest', JavaExec) {
    group = 'verification'
    description = 'Runs `ResultTest` main function.'
    dependsOn tasks.named('compileTestCapybara')

    classpath = sourceSets.test.runtimeClasspath
    mainClass = 'capy.lang.ResultTest'
}

tasks.register('runSeqTest', JavaExec) {
    group = 'verification'
    description = 'Runs `SeqTest` main function.'
    dependsOn tasks.named('compileTestCapybara')

    classpath = sourceSets.test.runtimeClasspath
    mainClass = 'capy.lang.SeqTest'
}

tasks.register('runCollectionAssertTest', JavaExec) {
    group = 'verification'
    description = 'Runs `CollectionAssertTest` main function.'
    dependsOn tasks.named('compileTestCapybara')

    classpath = sourceSets.test.runtimeClasspath
    mainClass = 'capy.assert_.CollectionAssertTest'
}

tasks.register('testCapybara') {
    group = 'verification'
    description = 'Runs all generated Capybara main-based tests.'
    dependsOn tasks.named('runJsonTest'), tasks.named('runResultTest'), tasks.named('runSeqTest'), tasks.named('runCollectionAssertTest')
}

sourceSets {
    main {
        java.srcDir capybaraGeneratedMainDir
    }
    test {
        java.srcDir capybaraGeneratedTestDir
    }
}

tasks.named('compileJava') {
    dependsOn tasks.named('compileCapybara')
}

tasks.named('compileTestJava') {
    dependsOn tasks.named('compileTestCapybara')
}

tasks.named('test') {
    dependsOn tasks.named('testCapybara')
    failOnNoDiscoveredTests = false
}
