plugins {
    id 'buildlogic.java-library-conventions'
}

def capyProject = project(':capy')
def compilerProject = project(':compiler')
def capyExternalRuntimeClasspath = capyProject.configurations.runtimeClasspath.incoming.artifactView {
    componentFilter { componentIdentifier ->
        !(componentIdentifier instanceof org.gradle.api.artifacts.component.ProjectComponentIdentifier)
    }
}.files
def capyExecutionClasspath = files(
        capyProject.sourceSets.main.output,
        compilerProject.sourceSets.main.output.classesDirs,
        capyExternalRuntimeClasspath
)

def capybaraMainSourceDir = layout.projectDirectory.dir('src/main/capybara')
def capybaraTestSourceDir = layout.projectDirectory.dir('src/test/capybara')
def capybaraGeneratedMainDir = layout.buildDirectory.dir('generated/sources/capybara/java/main')
def capybaraGeneratedTestDir = layout.buildDirectory.dir('generated/sources/capybara/java/test')
def capybaraLinkedMainDir = layout.buildDirectory.dir('generated/sources/capybara/linked/main')
def capybaraTestResultsDir = layout.buildDirectory.dir('test-results/capybara')
def capybaraDebugEnabled = gradle.startParameter.logLevel == org.gradle.api.logging.LogLevel.DEBUG

def prepareEmptyDir = { File dir ->
    if (dir.exists()) {
        java.nio.file.Files.walk(dir.toPath())
                .sorted(java.util.Comparator.reverseOrder())
                .forEach { path ->
                    if (path != dir.toPath()) {
                        java.nio.file.Files.deleteIfExists(path)
                    }
                }
    } else {
        dir.mkdirs()
    }
}

tasks.register('linkCapybara', JavaExec) {
    group = 'build'
    description = 'Compiles Capybara files from src/main/capybara and generates Java in one pass.'

    inputs.dir(capybaraMainSourceDir)
    outputs.dir(capybaraGeneratedMainDir)
    outputs.dir(capybaraLinkedMainDir)

    classpath = capyExecutionClasspath
    mainClass = 'dev.capylang.Capy'

    doFirst {
        prepareEmptyDir(capybaraLinkedMainDir.get().asFile)
        prepareEmptyDir(capybaraGeneratedMainDir.get().asFile)
        def capybaraArgs = [
                'compile-generate',
                'java',
                '--skip-java-lib',
                '-i', capybaraMainSourceDir.asFile.absolutePath,
                '-o', capybaraGeneratedMainDir.get().asFile.absolutePath,
                '--linked-output', capybaraLinkedMainDir.get().asFile.absolutePath
        ]
        capybaraArgs.addAll(capybaraDebugEnabled ? ['--log', 'DEBUG'] : ['--log', 'WARN'])
        setArgs(capybaraArgs)
    }

}

tasks.register('compileCapybara') {
    group = 'build'
    description = 'Generates Java from main Capybara sources.'
    dependsOn tasks.named('linkCapybara')
}

tasks.register('compileTestCapybara', JavaExec) {
    group = 'verification'
    description = 'Compiles test Capybara files and generates Java without writing linked intermediates.'
    dependsOn tasks.named('linkCapybara')

    inputs.dir(capybaraTestSourceDir)
    inputs.dir(capybaraLinkedMainDir)
    outputs.dir(capybaraGeneratedTestDir)

    classpath = capyExecutionClasspath
    mainClass = 'dev.capylang.Capy'

    doFirst {
        prepareEmptyDir(capybaraGeneratedTestDir.get().asFile)
        def capybaraArgs = [
                'compile-generate',
                'java',
                '--skip-java-lib',
                '-i', capybaraTestSourceDir.asFile.absolutePath,
                '-o', capybaraGeneratedTestDir.get().asFile.absolutePath,
                '-l', capybaraLinkedMainDir.get().asFile.absolutePath,
                '--compile-tests'
        ]
        capybaraArgs.addAll(capybaraDebugEnabled ? ['--log', 'DEBUG'] : ['--log', 'WARN'])
        setArgs(capybaraArgs)
    }
}

tasks.register('testCapybara', JavaExec) {
    group = 'verification'
    description = 'Runs Capybara tests from compiled test classes.'
    dependsOn tasks.named('compileTestJava')

    classpath = sourceSets.test.runtimeClasspath
    mainClass = 'dev.capylang.test.TestRunner'

    doFirst {
        prepareEmptyDir(capybaraTestResultsDir.get().asFile)
        def capybaraArgs = [
                '-o', capybaraTestResultsDir.get().asFile.absolutePath,
                '-rt', 'JUNIT'
        ]
        if (capybaraDebugEnabled) {
            capybaraArgs.addAll(['-ll', 'DEBUG'])
        }
        setArgs(capybaraArgs)
    }
}

sourceSets {
    main {
        java.srcDir capybaraGeneratedMainDir
    }
    test {
        java.srcDir capybaraGeneratedTestDir
    }
}

tasks.named('compileJava') {
    dependsOn tasks.named('compileCapybara')
}

tasks.named('compileTestJava') {
    dependsOn tasks.named('compileTestCapybara')
}

tasks.matching { it.name == 'test' }.configureEach {
    dependsOn tasks.named('testCapybara')
    if (it.hasProperty('failOnNoDiscoveredTests')) {
        failOnNoDiscoveredTests = false
    }
}

tasks.matching { it.name == 'check' }.configureEach {
    dependsOn tasks.named('testCapybara')
}
