import org.gradle.api.DefaultTask
import org.gradle.api.GradleException
import org.gradle.api.file.ConfigurableFileCollection
import org.gradle.api.file.DirectoryProperty
import org.gradle.api.provider.Property
import org.gradle.api.tasks.Classpath
import org.gradle.api.tasks.Input
import org.gradle.api.tasks.InputDirectory
import org.gradle.api.tasks.InputFiles
import org.gradle.api.tasks.Optional
import org.gradle.api.tasks.OutputDirectory
import org.gradle.api.tasks.PathSensitive
import org.gradle.api.tasks.PathSensitivity
import org.gradle.api.tasks.TaskAction

import java.io.ByteArrayOutputStream
import java.io.PrintStream
import java.net.URL
import java.net.URLClassLoader
import java.nio.file.Files
import java.nio.file.Path
import java.util.TreeSet

plugins {
    id 'buildlogic.java-library-conventions'
}

abstract class InProcessCapybaraCompileTask extends DefaultTask {
    @Classpath
    abstract ConfigurableFileCollection getRuntimeClasspath()

    @InputDirectory
    @PathSensitive(PathSensitivity.RELATIVE)
    abstract DirectoryProperty getInputDir()

    @InputFiles
    @PathSensitive(PathSensitivity.RELATIVE)
    abstract ConfigurableFileCollection getAdditionalInputDirs()

    @Optional
    @OutputDirectory
    abstract DirectoryProperty getLinkedOutputDir()

    @OutputDirectory
    abstract DirectoryProperty getGeneratedOutputDir()

    @Optional
    @InputDirectory
    @PathSensitive(PathSensitivity.RELATIVE)
    abstract DirectoryProperty getTestInputDir()

    @Optional
    @OutputDirectory
    abstract DirectoryProperty getTestGeneratedOutputDir()

    @Input
    abstract Property<Boolean> getCompileTests()

    @Input
    abstract Property<Boolean> getIncludeJavaLibResources()

    @TaskAction
    void compileCapybara() {
        def errors = new ByteArrayOutputStream()
        def runtimeUrls = runtimeClasspath.files.collect { it.toURI().toURL() } as URL[]
        URLClassLoader classLoader = new URLClassLoader(runtimeUrls, ClassLoader.getPlatformClassLoader())
        try {
            def capyClass = Class.forName('dev.capylang.Capy', true, classLoader)
            def outputTypeClass = Class.forName('dev.capylang.compiler.OutputType', true, classLoader)
            def outputType = outputTypeClass.enumConstants.find { it.name() == 'JAVA' }
            def readLinkedProgram = capyClass.getDeclaredMethod('readLinkedProgram', Path, Boolean.TYPE)
            readLinkedProgram.accessible = true
            def compileGenerate = capyClass.getMethod(
                    'compileGenerate',
                    outputTypeClass,
                    Path,
                    Path,
                    Path,
                    Path,
                    Path,
                    TreeSet,
                    Boolean.TYPE,
                    Boolean.TYPE,
                    PrintStream
            )

            def libraries = new TreeSet()
            additionalInputDirs.files.each { libraryDir ->
                Path libraryPath = libraryDir.toPath()
                if (Files.notExists(libraryPath) || !Files.isDirectory(libraryPath)) {
                    return
                }
                def program = readLinkedProgram.invoke(null, libraryPath, false)
                libraries.addAll(program.modules())
            }

            def exitCode = compileGenerate.invoke(
                    null,
                    outputType,
                    inputDir.get().asFile.toPath(),
                    generatedOutputDir.get().asFile.toPath(),
                    linkedOutputDir.present ? linkedOutputDir.get().asFile.toPath() : null,
                    testInputDir.present ? testInputDir.get().asFile.toPath() : null,
                    testGeneratedOutputDir.present ? testGeneratedOutputDir.get().asFile.toPath() : null,
                    libraries,
                    compileTests.getOrElse(false),
                    includeJavaLibResources.getOrElse(true),
                    new PrintStream(errors)
            ) as Integer

            if (exitCode != 0) {
                def message = errors.toString().trim()
                throw new GradleException(message ?: "Capybara compile failed with exit code ${exitCode}")
            }
        } finally {
            classLoader.close()
        }
    }
}

abstract class InProcessCapybaraTestTask extends DefaultTask {
    @Classpath
    abstract ConfigurableFileCollection getRuntimeClasspath()

    @OutputDirectory
    abstract DirectoryProperty getOutputDir()

    @Input
    abstract Property<String> getReportType()

    @Input
    abstract Property<String> getLogLevel()

    @TaskAction
    void runCapybaraTests() {
        outputDir.get().asFile.mkdirs()

        def runtimeUrls = runtimeClasspath.files.collect { it.toURI().toURL() } as URL[]
        URLClassLoader classLoader = new URLClassLoader(runtimeUrls, ClassLoader.getPlatformClassLoader())
        def originalContextClassLoader = Thread.currentThread().contextClassLoader
        try {
            Thread.currentThread().contextClassLoader = classLoader
            def testRunnerClass = Class.forName('dev.capylang.test.TestRunner', true, classLoader)
            def argumentsClass = Class.forName('dev.capylang.test.TestRunner$Arguments', true, classLoader)
            def parseArguments = testRunnerClass.getMethod('parseArguments', String[].class)
            def runTests = testRunnerClass.getMethod('runTests', argumentsClass)

            def args = [
                    '-o', outputDir.get().asFile.absolutePath,
                    '-rt', reportType.get()
            ]
            def configuredLogLevel = logLevel.orNull
            if (configuredLogLevel != null && !configuredLogLevel.isBlank()) {
                args.addAll(['-ll', configuredLogLevel])
            }

            def parsedArguments = parseArguments.invoke(null, (Object) args.toArray(new String[0]))
            def exitCode = runTests.invoke(null, parsedArguments) as Integer
            if (exitCode != 0) {
                throw new GradleException("Capybara tests failed with exit code ${exitCode}")
            }
        } finally {
            Thread.currentThread().contextClassLoader = originalContextClassLoader
            classLoader.close()
        }
    }
}

def capyProject = project(':capy')
def capyRuntimeClasspath = capyProject.sourceSets.main.runtimeClasspath

def capybaraMainSourceDir = layout.projectDirectory.dir('src/main/capybara')
def capybaraTestSourceDir = layout.projectDirectory.dir('src/test/capybara')
def capybaraGeneratedMainDir = layout.buildDirectory.dir('generated/sources/capybara/java/main')
def capybaraGeneratedTestDir = layout.buildDirectory.dir('generated/sources/capybara/java/test')
def capybaraLinkedMainDir = layout.buildDirectory.dir('generated/sources/capybara/linked/main')
def capybaraTestResultsDir = layout.buildDirectory.dir('test-results/capybara')
def capybaraDebugEnabled = gradle.startParameter.logLevel == org.gradle.api.logging.LogLevel.DEBUG
def capybaraTestBuildRequested = providers.provider {
    gradle.startParameter.taskNames.any { taskName ->
        taskName == 'check' || taskName.endsWith(':check') ||
                taskName == 'test' || taskName.endsWith(':test') ||
                taskName == 'testClasses' || taskName.endsWith(':testClasses') ||
                taskName == 'compileTestJava' || taskName.endsWith(':compileTestJava') ||
                taskName == 'compileTestCapybara' || taskName.endsWith(':compileTestCapybara') ||
                taskName == 'testCapybara' || taskName.endsWith(':testCapybara')
    }
}

tasks.register('linkCapybaraDirect', InProcessCapybaraCompileTask) {
    group = 'build'
    description = 'Compiles Capybara files from src/main/capybara and generates Java in one pass.'

    runtimeClasspath.from(capyRuntimeClasspath)
    inputDir.set(capybaraMainSourceDir)
    generatedOutputDir.set(capybaraGeneratedMainDir)
    linkedOutputDir.set(capybaraLinkedMainDir)
    compileTests.set(false)
    includeJavaLibResources.set(false)
    onlyIf { !capybaraTestBuildRequested.get() }
}

tasks.register('prepareCapybaraForCheck', InProcessCapybaraCompileTask) {
    group = 'verification'
    description = 'Compiles main and test Capybara files for check/test builds in one pass.'

    runtimeClasspath.from(capyRuntimeClasspath)
    inputDir.set(capybaraMainSourceDir)
    generatedOutputDir.set(capybaraGeneratedMainDir)
    testInputDir.set(capybaraTestSourceDir)
    testGeneratedOutputDir.set(capybaraGeneratedTestDir)
    compileTests.set(false)
    includeJavaLibResources.set(false)
    onlyIf { capybaraTestBuildRequested.get() }
}

tasks.register('linkCapybara') {
    group = 'build'
    description = 'Compiles Capybara files from src/main/capybara and generates Java in one pass.'
    dependsOn tasks.named('linkCapybaraDirect')
}

tasks.register('compileCapybara') {
    group = 'build'
    description = 'Generates Java from main Capybara sources.'
    dependsOn tasks.named('linkCapybara')
}

tasks.register('compileTestCapybaraDirect', InProcessCapybaraCompileTask) {
    group = 'verification'
    description = 'Compiles test Capybara files and generates Java without writing linked intermediates.'
    dependsOn tasks.named('linkCapybaraDirect')

    runtimeClasspath.from(capyRuntimeClasspath)
    inputDir.set(capybaraTestSourceDir)
    additionalInputDirs.from(capybaraLinkedMainDir)
    generatedOutputDir.set(capybaraGeneratedTestDir)
    compileTests.set(true)
    includeJavaLibResources.set(false)
    onlyIf { !capybaraTestBuildRequested.get() }
}

tasks.register('compileTestCapybara') {
    group = 'verification'
    description = 'Compiles test Capybara files and generates Java without writing linked intermediates.'
    dependsOn tasks.named('compileTestCapybaraDirect')
}

tasks.register('testCapybara', InProcessCapybaraTestTask) {
    group = 'verification'
    description = 'Runs Capybara tests from compiled test classes without launching a separate JVM.'
    dependsOn tasks.named('compileTestJava')

    runtimeClasspath.from(sourceSets.test.runtimeClasspath)
    outputDir.set(capybaraTestResultsDir)
    reportType.set('JUNIT')
    logLevel.set(capybaraDebugEnabled ? 'DEBUG' : 'INFO')
}

sourceSets {
    main {
        java.srcDir capybaraGeneratedMainDir
    }
    test {
        java.srcDir capybaraGeneratedTestDir
    }
}

tasks.named('compileJava') {
    if (capybaraTestBuildRequested.get()) {
        dependsOn tasks.named('prepareCapybaraForCheck')
    } else {
        dependsOn tasks.named('compileCapybara')
    }
}

tasks.named('compileTestJava') {
    if (capybaraTestBuildRequested.get()) {
        dependsOn tasks.named('prepareCapybaraForCheck')
    } else {
        dependsOn tasks.named('compileTestCapybara')
    }
}

tasks.matching { it.name == 'test' }.configureEach {
    dependsOn tasks.named('testCapybara')
    if (it.hasProperty('failOnNoDiscoveredTests')) {
        failOnNoDiscoveredTests = false
    }
}

tasks.matching { it.name == 'check' }.configureEach {
    dependsOn tasks.named('testCapybara')
}
