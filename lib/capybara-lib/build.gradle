plugins {
    id 'buildlogic.java-library-conventions'
}

dependencies {
    implementation project(':lib:java-lib')
}

def capybaraMainSourceDir = layout.projectDirectory.dir('src/main/capybara')
def capybaraTestSourceDir = layout.projectDirectory.dir('src/test/capybara')
def capybaraGeneratedMainDir = layout.buildDirectory.dir('generated/sources/capybara/java/main')
def capybaraGeneratedTestDir = layout.buildDirectory.dir('generated/sources/capybara/java/test')
def capybaraDebugEnabled = gradle.startParameter.logLevel == org.gradle.api.logging.LogLevel.DEBUG

tasks.register('compileCapybara', JavaExec) {
    group = 'build'
    description = 'Compiles Capybara files from src/main/capybara.'

    inputs.dir(capybaraMainSourceDir)
    outputs.dir(capybaraGeneratedMainDir)

    classpath = project(':app').sourceSets.main.runtimeClasspath
    mainClass = 'pl.grzeslowski.capybara.App'

    doFirst {
        def capybaraArgs = []
        if (capybaraDebugEnabled) {
            capybaraArgs << '--debug'
        }
        capybaraArgs.addAll([
                'JAVA',
                capybaraMainSourceDir.asFile.absolutePath,
                capybaraGeneratedMainDir.get().asFile.absolutePath
        ])
        setArgs(capybaraArgs)
    }
}

tasks.register('compileTestCapybara', JavaExec) {
    group = 'verification'
    description = 'Compiles Capybara files from src/main/capybara and src/test/capybara.'
    dependsOn tasks.named('compileCapybara')

    inputs.dir(capybaraMainSourceDir)
    inputs.dir(capybaraTestSourceDir)
    outputs.dir(capybaraGeneratedTestDir)

    classpath = project(':app').sourceSets.main.runtimeClasspath
    mainClass = 'pl.grzeslowski.capybara.App'

    doFirst {
        def inputDirs = [capybaraMainSourceDir.asFile, capybaraTestSourceDir.asFile]
                .findAll { it.exists() && it.isDirectory() }
                .collect { it.absolutePath }
        def capybaraArgs = []
        if (capybaraDebugEnabled) {
            capybaraArgs << '--debug'
        }
        capybaraArgs.add('JAVA')
        capybaraArgs.addAll(inputDirs)
        capybaraArgs.add(capybaraGeneratedTestDir.get().asFile.absolutePath)
        setArgs(capybaraArgs)
    }
}

tasks.register('runJsonTest', JavaExec) {
    group = 'verification'
    description = 'Runs `JsonTest` main function.'
    dependsOn tasks.named('compileTestCapybara')

    classpath = sourceSets.test.runtimeClasspath
    mainClass = 'lang.serialization.JsonTest'
}

tasks.register('runResultTest', JavaExec) {
    group = 'verification'
    description = 'Runs `ResultTest` main function.'
    dependsOn tasks.named('compileTestCapybara')

    classpath = sourceSets.test.runtimeClasspath
    mainClass = 'capy.lang.ResultTest'
}

tasks.register('testCapybara') {
    group = 'verification'
    description = 'Runs all generated Capybara main-based tests.'
    dependsOn tasks.named('runJsonTest'), tasks.named('runResultTest')
}

sourceSets {
    main {
        java.srcDir capybaraGeneratedMainDir
    }
    test {
        java.srcDir capybaraGeneratedTestDir
    }
}

tasks.named('compileJava') {
    dependsOn tasks.named('compileCapybara')
}

tasks.named('compileTestJava') {
    dependsOn tasks.named('compileTestCapybara')
}

tasks.named('test') {
    dependsOn tasks.named('testCapybara')
    failOnNoDiscoveredTests = false
}
